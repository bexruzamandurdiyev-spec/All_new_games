<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X va O: Pro Versiya</title>

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle, #2c3e50, #000000);
            color: white;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 10px;
            text-shadow: 0 0 10px #3498db;
        }

        .status {
            margin-bottom: 20px;
            font-size: 1.5rem;
            padding: 10px 20px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 15px;
            perspective: 1000px;
        }

        .cell {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #3498db;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.2);
        }

        .cell:hover {
            background: rgba(52, 152, 219, 0.2);
            transform: scale(1.05) rotateY(10deg);
        }

        .cell.x { color: #ff4757; text-shadow: 0 0 15px #ff4757; }
        .cell.o { color: #2ed573; text-shadow: 0 0 15px #2ed573; }

        /* G'olib kataklar uchun animatsiya */
        .winner-cell {
            background: rgba(255, 255, 0, 0.3) !important;
            animation: pulse 0.5s infinite alternate;
        }
