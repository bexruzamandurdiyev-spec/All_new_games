<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator - CFE</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --primary: #3498db;
            --display-bg: #2c3e50;
            --btn-home: #2ecc71;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }
        .calculator {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 320px;
        }
        #display {
            width: 100%;
            height: 65px;
            background-color: var(--display-bg);
            color: #ffffff;
            text-align: right;
            font-size: 26px;
            border: none;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background-color: #ecf0f1;
            transition: 0.2s;
        }
        button:hover { background-color: #d5dbdb; transform: scale(1.05); }
        .op { background-color: #f39c12; color: white; }
        .eq { background-color: var(--primary); color: white; grid-column: span 2; }
        .clear { background-color: #e74c3c; color: white; }
        
        /* Ortga qaytish tugmasi stili */
        .home-btn {
            margin-top: 20px;
            background-color: var(--btn-home);
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .home-btn:hover { background-color: #27ae60; box-shadow: 0 6px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" placeholder="0" disabled>
    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button onclick="appendDisplay('**')">xʸ</button>
        <button onclick="calculateRoot()">ⁿ√</button>
        <button class="op" onclick="appendDisplay('/')">÷</button>

        <button onclick="appendDisplay('7')">7</button>
        <button onclick="appendDisplay('8')">8</button>
        <button onclick="appendDisplay('9')">9</button>
        <button class="op" onclick="appendDisplay('*')">×</button>

        <button onclick="appendDisplay('4')">4</button>
        <button onclick="appendDisplay('5')">5</button>
        <button onclick="appendDisplay('6')">6</button>
        <button class="op" onclick="appendDisplay('-')">-</button>

        <button onclick="appendDisplay('1')">1</button>
        <button onclick="appendDisplay('2')">2</button>
        <button onclick="appendDisplay('3')">3</button>
        <button class="op" onclick="appendDisplay('+')">+</button>

        <button onclick="appendDisplay('0')">0</button>
        <button onclick="appendDisplay('%')">%</button>
        <button onclick="calculateFactorial()">!</button>
        <button class="op" onclick="appendDisplay('.')">.</button>

        <button class="eq" onclick="calculate()">=</button>
        <button class="clear" onclick="backspace()" style="grid-column: span 2;">DEL</button>
    </div>
</div>

<a href="index.html" class="home-btn">🏠 Asosiy sahifaga qaytish</a>

<script>
    let display = document.getElementById('display');

    function appendDisplay(value) {
        display.value += value;
    }

    function clearDisplay() {
        display.value = '';
    }

    function backspace() {
        display.value = display.value.slice(0, -1);
    }

    function calculate() {
        try {
            // eval o'rniga xavfsizroq amallarni bajarish mumkin, lekin o'quv loyihasi uchun bu yetarli
            display.value = eval(display.value);
        } catch (e) {
            display.value = 'Xato!';
        }
    }

    function calculateFactorial() {
        let num = parseInt(display.value);
        if (isNaN(num) || num < 0) return display.value = "Xato!";
        let fact = 1;
        for (let i = 1; i <= num; i++) fact *= i;
        display.value = fact;
    }

    function calculateRoot() {
        let base = parseFloat(display.value);
        if (isNaN(base)) return alert("Avval sonni kiriting!");
        let root = prompt("Ildiz darajasini kiriting (masalan, 2 yoki 3):");
        if (root) {
            display.value = Math.pow(base, 1/root);
        }
    }
</script>

</body>
</html>
