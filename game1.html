<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ilk Uyg'onish Davri Metodi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #2c3e50; color: white; text-align: center; margin: 0; padding: 20px; }
        .screen { display: none; }
        .active { display: block; }
        h1 { color: #f1c40f; font-size: 3rem; }
        .btn-start { padding: 15px 40px; font-size: 1.5rem; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 10px; transition: 0.3s; }
        .btn-start:hover { background: #2ecc71; }
        
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; max-width: 800px; margin: 20px auto; }
        .q-btn { padding: 25px; font-size: 1.5rem; background: #34495e; color: #ecf0f1; border: 2px solid #f1c40f; cursor: pointer; border-radius: 8px; }
        .q-btn.used { background: #7f8c8d; cursor: not-allowed; border-color: #95a5a6; }

        .teams { display: flex; justify-content: center; gap: 30px; margin-top: 30px; }
        .team-box { background: #34495e; padding: 15px; border-radius: 10px; border-top: 5px solid #f1c40f; min-width: 150px; }
        .score { font-size: 2rem; font-weight: bold; display: block; }

        #modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .question-box { background: white; color: #333; padding: 30px; border-radius: 15px; max-width: 600px; width: 90%; }
        .options { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .opt-btn { padding: 10px; font-size: 1.1rem; cursor: pointer; border: 1px solid #ccc; border-radius: 5px; text-align: left; }
        .opt-btn:hover { background: #f0f0f0; }
        
        .team-selector { margin-top: 20px; }
        .team-selector button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .lucky { font-size: 3rem; color: #f1c40f; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen active">
        <h1>Ilk Uygʻonish Davri Madaniyati</h1>
        <button class="btn-start" onclick="startGame()">Metodni boshlash</button>
    </div>

    <div id="game-screen" class="screen">
        <h2 id="status-text">Metod boshlandi!</h2>
        <div class="grid" id="question-grid"></div>
        
        <div class="teams">
            <div class="team-box">1-Jamoa <span class="score" id="s0">0</span></div>
            <div class="team-box">2-Jamoa <span class="score" id="s1">0</span></div>
            <div class="team-box">3-Jamoa <span class="score" id="s2">0</span></div>
        </div>
    </div>

    <div id="modal">
        <div class="question-box" id="q-content"></div>
        <div class="team-selector" id="t-selector" style="display:none;">
            <p style="color:white">Qaysi jamoa javob beradi?</p>
            <button onclick="applyLucky(0)">1-Jamoa</button>
            <button onclick="applyLucky(1)">2-Jamoa</button>
            <button onclick="applyLucky(2)">3-Jamoa</button>
        </div>
    </div>

<script>
    let scores = [0, 0, 0];
    let currentPoints = 0;
    let currentCorrectIndex = -1;
    let currentBtnId = null;

    const questions = [
        { q: "Renessans so'zi qanday ma'noni anglatadi?", a: ["Gullash", "Uyg'onish", "Inqiroz", "Yangi asr"], c: 1, p: 50 },
        { q: "Ilk Uyg'onish davri qaysi yillarni qamrab oladi?", a: ["1350-1400", "1420-1500", "1500-1527", "1530-1620"], c: 1, p: 100 },
        { q: "Gumanitar fanlarga qaysi fan kirmaydi?", a: ["Ritorika", "She'riyat", "Fizika", "Tarix"], c: 2, p: 150 },
        { q: "Dante Aligyerining eng mashhur asari qaysi?", a: ["Ilohiy komediya", "Dekameron", "Kandid", "Hamshira"], c: 0, p: 100 },
        { q: "Florensiya sobori gumbazi me'mori kim?", a: ["Donatello", "Filippo Brunelleski", "Mazachcho", "Jotto"], c: 1, p: 150 },
        { q: "Renessans davri qaysi davlatda boshlangan?", a: ["Gretsiya", "Fransiya", "Italiya", "Germaniya"], c: 2, p: 50 },
        { q: "Yangi g'oyalarning Shimoliy Yevropaga tarqalishida kimlar rol o'ynagan?", a: ["Savdogarlar", "Rassomlar", "Talabalar va gumanistlar", "Harbiylar"], c: 2, p: 100 },
        { q: "Shimoliy Uyg'onish davrining yirik vakili kim?", a: ["Yan van Eyk", "Dante", "Mazachcho", "Brunelleski"], c: 0, p: 150 },
        { q: "Ilk bor yog'li bo'yoqlardan foydalangan rassom?", a: ["Mikelyanjelo", "Yan van Eyk", "Leonardo", "Rafael"], c: 1, p: 150 },
        { q: "Uyg'onish davri musiqasida qaysi cholg'u asbobi ommalashgan?", a: ["Gitarra", "Lyutnya", "Saksafon", "Piano"], c: 1, p: 100 },
        { q: "Gumanizm so'zi qaysi tildan olingan?", a: ["Grets", "Lotin", "Arab", "Ingliz"], c: 1, p: 50 },
        { q: "Renessans madaniyati asosan qaysi qatlam orasida rivojlandi?", a: ["Dehqonlar", "Shahar aholisi (burjuaziya)", "Harbiylar", "Ruhoniylar"], c: 1, p: 100 },
        { type: "lucky", p: 100 },
        { type: "lucky", p: 50 },
        { type: "lucky", p: 150 }
    ];

    // Savollarni aralashtirish
    questions.sort(() => Math.random() - 0.5);

    function startGame() {
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        const grid = document.getElementById('question-grid');
        
        for(let i=0; i<15; i++) {
            const btn = document.createElement('button');
            btn.className = 'q-btn';
            btn.innerText = i + 1;
            btn.id = 'btn-' + i;
            btn.onclick = () => openQuestion(i);
            grid.appendChild(btn);
        }
    }

    function openQuestion(index) {
        const btn = document.getElementById('btn-' + index);
        if(btn.classList.contains('used')) return;
        
        currentBtnId = index;
        const q = questions[index];
        const modal = document.getElementById('modal');
        const content = document.getElementById('q-content');
        const tSelector = document.getElementById('t-selector');
        
        modal.style.display = 'flex';
        
        if(q.type === "lucky") {
            content.innerHTML = `<div class="lucky">🎁 OMADLI BALL! <br> +${q.p} ball</div>`;
            tSelector.style.display = 'block';
            currentPoints = q.p;
        } else {
            tSelector.style.display = 'none';
            currentPoints = q.p;
            currentCorrectIndex = q.c;
            let optionsHtml = q.a.map((opt, i) => `<button class="opt-btn" onclick="checkAnswer(${i})">${i+1}. ${opt}</button>`).join('');
            content.innerHTML = `<h3>[${q.p} ball]</h3><p style="font-size:1.3rem">${q.q}</p><div class="options">${optionsHtml}</div>`;
        }
        btn.classList.add('used');
    }

    function checkAnswer(idx) {
        const content = document.getElementById('q-content');
        content.innerHTML += `<div class="team-selector" style="margin-top:20px"><p>Qaysi jamoa javob berdi?</p>
            <button onclick="finishQuestion(0, ${idx === currentCorrectIndex})">1-Jamoa</button>
            <button onclick="finishQuestion(1, ${idx === currentCorrectIndex})">2-Jamoa</button>
            <button onclick="finishQuestion(2, ${idx === currentCorrectIndex})">3-Jamoa</button>
        </div>`;
    }

    function applyLucky(teamIdx) {
        scores[teamIdx] += currentPoints;
        updateScores();
        closeModal();
    }

    function finishQuestion(teamIdx, isCorrect) {
        if(isCorrect) {
            scores[teamIdx] += currentPoints;
            alert("To'g'ri javob!");
        } else {
            scores[teamIdx] -= currentPoints;
            alert("Noto'g'ri javob! Ball ayrildi.");
        }
        updateScores();
        closeModal();
    }

    function updateScores() {
        scores.forEach((s, i) => document.getElementById('s' + i).innerText = s);
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('t-selector').style.display = 'none';
    }
</script>
</body>
</html>
