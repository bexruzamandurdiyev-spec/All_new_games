<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Uyg'onish Davri - Neon Quiz</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ff;
            --neon-green: #00ff41;
        }
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Orbitron', sans-serif;
            background: #0d0d0d;
            background-image: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            color: white;
            overflow-x: hidden;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
            color: var(--neon-blue);
        }
        .btn-start {
            padding: 20px 60px;
            font-size: 24px;
            background: transparent;
            color: var(--neon-green);
            border: 3px solid var(--neon-green);
            cursor: pointer;
            border-radius: 50px;
            box-shadow: 0 0 15px var(--neon-green);
            transition: 0.3s;
            margin-top: 100px;
        }
        .btn-start:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 40px var(--neon-green);
        }
        #game-screen { display: none; }
        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 15px;
            max-width: 1000px;
            margin: 30px auto;
        }
        .q-btn {
            padding: 20px;
            font-size: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 2px solid var(--neon-blue);
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
        }
        .q-btn:hover {
            box-shadow: 0 0 20px var(--neon-blue);
            transform: scale(1.05);
        }
        .used {
            border-color: #444 !important;
            color: #444 !important;
            box-shadow: none !important;
            cursor: not-allowed;
        }
        .teams {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
        }
        .team-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border: 2px solid var(--neon-pink);
            border-radius: 15px;
            width: 180px;
            box-shadow: 0 0 10px var(--neon-pink);
        }
        .score { font-size: 32px; color: var(--neon-pink); display: block; }
        
        /* Modal & Animations */
        #modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1a1a1a;
            padding: 40px;
            border: 2px solid var(--neon-blue);
            border-radius: 20px;
            max-width: 700px;
            width: 90%;
            box-shadow: 0 0 30px var(--neon-blue);
        }
        .opt-btn {
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            background: transparent; color: white;
            border: 1px solid var(--neon-blue);
            cursor: pointer; border-radius: 8px; font-size: 18px;
        }
        .opt-btn:hover { background: var(--neon-blue); color: black; }
        
        /* Feedback Effect */
        #feedback {
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 100px; font-weight: bold;
            z-index: 2000; pointer-events: none;
            display: none;
            text-shadow: 0 0 20px currentColor;
        }
    </style>
</head>
<body>

    <div id="feedback"></div>

    <div id="start-screen">
        <h1>ILK UYG'ONISH DAVRI</h1>
        <button class="btn-start" onclick="startGame()">METODNI BOSHLASH</button>
    </div>

    <div id="game-screen">
        <h2 style="color: var(--neon-green)">METOD BOSHLANDI</h2>
        <div class="grid" id="grid"></div>
        
        <div class="teams">
            <div class="team-box">1-JAMOA <span class="score" id="s0">0</span></div>
            <div class="team-box">2-JAMOA <span class="score" id="s1">0</span></div>
            <div class="team-box">3-JAMOA <span class="score" id="s2">0</span></div>
        </div>
    </div>

    <div id="modal">
        <div class="modal-content" id="modal-body"></div>
    </div>

<script>
    const teamScores = [0, 0, 0];
    let currentQ = null;

    // 21 ta savol va bonuslar
    const data = [
        { q: "Renessans so'zi qaysi tildan olingan?", a: ["Lotin", "Fransuz", "Italyan", "Yunon"], c: 1, p: 50 },
        { q: "Gumanizm g'oyasi markazida nima turadi?", a: ["Din", "Inson", "Davlat", "Tabiat"], c: 1, p: 100 },
        { q: "Dante Aligyerining vatani qayer?", a: ["Rim", "Venetsiya", "Florensiya", "Milan"], c: 2, p: 50 },
        { q: "Ilohiy komediya necha qismdan iborat?", a: ["2 ta", "3 ta", "4 ta", "5 ta"], c: 1, p: 150 },
        { q: "Petrarka nima uchun 'Lotin shoiri' deb atalgan?", a: ["Lotin tilida yozgani uchun", "Rimda tug'ilgani uchun", "Huquqshunos bo'lgani uchun", "Fransiyada yashagani uchun"], c: 0, p: 100 },
        { q: "Florensiya sobori gumbazi balandligi necha metr?", a: ["80 m", "91 m", "114 m", "150 m"], c: 1, p: 150 },
        { q: "Mazachcho qaysi san'at turi bilan mashhur?", a: ["Haykaltaroshlik", "Musiqa", "Rassomchilik", "Me'morchilik"], c: 2, p: 100 },
        { q: "Shimoliy Uyg'onish markazi qaysi hudud bo'lgan?", a: ["Ispaniya", "Niderlandiya", "Angliya", "Rossiya"], c: 1, p: 150 },
        { q: "Yan van Eyk qayerlik rassom?", a: ["Italiya", "Germaniya", "Flandriya", "Fransiya"], c: 2, p: 100 },
        { q: "Renessans davrida eng ommabop cholg'u?", a: ["Arfa", "Lyutnya", "Gubka", "Nay"], c: 1, p: 50 },
        { q: "Ilk Uyg'onish davri qaysi asrlarga to'g'ri keladi?", a: ["XIII-XIV", "XIV-XV", "XV-XVI", "XVI-XVII"], c: 1, p: 100 },
        { q: "Gumanitar fanlar atamasi nima degani?", a: ["Insonparvarlik", "Davlatshunoslik", "Tabiatshunoslik", "Xudosharshunoslik"], c: 0, p: 50 },
        { q: "Dante Aligyeri asarlarini qaysi tilda yozgan?", a: ["Lotin", "Italyan (xalq tili)", "Fransuz", "Ispan"], c: 1, p: 150 },
        { q: "Renessans me'morchiligining otasi kim?", a: ["Donatello", "Brunelleski", "Mazachcho", "Jotto"], c: 1, p: 150 },
        { q: "Lyutnya cholg'usi qaysi asbobga o'xshash?", a: ["Doira", "Gitara", "Pianino", "Skripka"], c: 1, p: 50 },
        { q: "Uyg'onish davri madaniyati qayerda gullab yashnagan?", a: ["Yirik shaharlarda", "Qishloqlarda", "Monastirlarda", "Tog'larda"], c: 0, p: 100 },
        { q: "Franchesko Petrarka qaysi soha vakili?", a: ["Rassom", "Shoir va olim", "Me'mor", "Musiqachi"], c: 1, p: 100 },
        { q: "Gumanistlar o'tmishning qaysi davrini o'rganishgan?", a: ["O'rta asr", "Antik davr", "Temuriylar davri", "Yangi davr"], c: 1, p: 50 },
        { type: "lucky", p: 150 },
        { type: "lucky", p: 100 },
        { type: "lucky", p: 50 }
    ];

    data.sort(() => Math.random() - 0.5);

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        const grid = document.getElementById('grid');
        for(let i=0; i<21; i++) {
            let b = document.createElement('button');
            b.className = 'q-btn';
            b.innerText = i + 1;
            b.onclick = () => openQ(i, b);
            grid.appendChild(b);
        }
    }

    function showFeedback(text, color) {
        const f = document.getElementById('feedback');
        f.innerText = text;
        f.style.color = color;
        f.style.display = 'block';
        setTimeout(() => { f.style.display = 'none'; }, 1500);
    }

    function openQ(index, btn) {
        if(btn.classList.contains('used')) return;
        btn.classList.add('used');
        currentQ = data[index];
        const modal = document.getElementById('modal');
        const body = document.getElementById('modal-body');
        modal.style.display = 'flex';

        if(currentQ.type === "lucky") {
            body.innerHTML = `<h1 style="color:var(--neon-green)">🎁 OMADLI BALL!</h1>
            <h2>+${currentQ.p} ball beriladi!</h2>
            <p>Qaysi jamoaga?</p>
            <button class="opt-btn" onclick="addLucky(0)">1-JAMOA</button>
            <button class="opt-btn" onclick="addLucky(1)">2-JAMOA</button>
            <button class="opt-btn" onclick="addLucky(2)">3-JAMOA</button>`;
        } else {
            let opts = currentQ.a.map((o, i) => `<button class="opt-btn" onclick="check(${i})">${o}</button>`).join('');
            body.innerHTML = `<h3>${currentQ.p} BALLIK SAVOL</h3><p style="font-size:22px">${currentQ.q}</p>${opts}`;
        }
    }

    function check(idx) {
        const isCorrect = (idx === currentQ.c);
        const body = document.getElementById('modal-body');
        
        if(isCorrect) showFeedback("TO'G'RI!", "#00ff41");
        else showFeedback("NOTO'G'RI!", "#ff0000");

        body.innerHTML = `<h2>JAVOBNI KIM BERDI?</h2>
        <button class="opt-btn" style="border-color:var(--neon-green)" onclick="final(0, ${isCorrect})">1-JAMOA</button>
        <button class="opt-btn" style="border-color:var(--neon-green)" onclick="final(1, ${isCorrect})">2-JAMOA</button>
        <button class="opt-btn" style="border-color:var(--neon-green)" onclick="final(2, ${isCorrect})">3-JAMOA</button>`;
    }

    function addLucky(tIdx) {
        teamScores[tIdx] += currentQ.p;
        update();
    }

    function final(tIdx, correct) {
        if(correct) teamScores[tIdx] += currentQ.p;
        else teamScores[tIdx] -= currentQ.p;
        update();
    }

    function update() {
        teamScores.forEach((s, i) => document.getElementById('s' + i).innerText = s);
        document.getElementById('modal').style.display = 'none';
    }
</script>
</body>
</html>
