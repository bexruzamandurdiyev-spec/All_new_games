<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma'lumot Izlash - CFE</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --primary: #3498db;
            --card: #ffffff;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }
        .search-container {
            background: var(--card);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }
        .search-logo {
            font-size: 50px;
            margin-bottom: 20px;
        }
        h2 {
            margin-bottom: 25px;
            color: #333;
        }
        .search-box {
            display: flex;
            gap: 10px;
            background: #f1f1f1;
            padding: 5px;
            border-radius: 50px;
            border: 2px solid transparent;
            transition: 0.3s;
        }
        .search-box:focus-within {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.2);
        }
        input {
            flex: 1;
            border: none;
            background: none;
            padding: 12px 20px;
            font-size: 18px;
            outline: none;
        }
        .search-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .search-btn:hover {
            background: #2980b9;
            transform: scale(1.05);
        }
        .home-btn {
            margin-top: 30px;
            text-decoration: none;
            color: #7f8c8d;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
        .home-btn:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>

<div class="search-container">
    <div class="search-logo">🔎</div>
    <h2>Ma'lumot Izlash</h2>
    
    <form action="https://www.google.com/search" method="GET" target="_blank" class="search-box">
        <input type="text" name="q" placeholder="Nimani izlamoqchisiz?..." required>
        <button type="submit" class="search-btn">Izlash</button>
    </form>

    <p style="font-size: 14px; color: #888; margin-top: 20px;">
        Savolingizni yozing va biz sizga eng to'g'ri ma'lumotlarni topib beramiz.
    </p>
</div>

<a href="index.html" class="home-btn">🏠 Asosiy sahifaga qaytish</a>

</body>
</html>
