<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shukur Xolmirzayev Ijodi - Neon Krossvord</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --bg-color: #0a0a0c;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 30px;
        }

        .questions {
            max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--neon-purple);
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.3);
        }

        .questions h3 {
            color: var(--neon-purple);
            border-bottom: 1px solid var(--neon-purple);
            padding-bottom: 10px;
        }

        ol { padding-left: 20px; }
        li { margin-bottom: 10px; font-size: 14px; line-height: 1.4; }

        .crossword-grid {
            display: grid;
            grid-template-columns: repeat(12, 35px);
            grid-template-rows: repeat(12, 35px);
            gap: 5px;
            background: #111;
            padding: 10px;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .cell {
            width: 35px;
            height: 35px;
            background: #1a1a1a;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .cell:focus {
            outline: none;
            background: #222;
            border: 1px solid var(--neon-blue);
            box-shadow: inset 0 0 5px var(--neon-blue);
        }

        .active-cell {
            background: #222;
            cursor: pointer;
        }
