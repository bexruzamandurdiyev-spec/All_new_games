<!DOCTYPE html>
<html>
<head>
    <title>Brawl Mini - Colt</title>
    <style>
        body { margin: 0; background: #1e293b; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        canvas { background: #334155; border: 4px solid #0f172a; border-radius: 10px; cursor: crosshair; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; }
        .instructions { position: absolute; bottom: 20px; color: #94a3b8; text-align: center; width: 100%; }
    </style>
</head>
<body>

<div id="ui">
    <div id="hp-text">HP: 3200</div>
    <div id="ammo-text">Ammo: |||</div>
    <div id="gadget-text" style="color: #f59e0b;">Gadget: Ready (Press G)</div>
</div>

<div class="instructions">Harakat: WASD | Otish: Sichqoncha | Gaget: G | Ulta: Q</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = 800;
canvas.height = 600;

// O'yin sozlamalari
let player = {
    x: 100, y: 100, w: 30, h: 30,
    hp: 3200, maxHp: 3200,
    ammo: 3, reloadTimer: 0,
    speed: 4, gadgetActive: false,
    color: '#4f46e5'
};

let bullets = [];
let walls = [
    {x: 300, y: 150, w: 40, h: 200},
    {x: 500, y: 250, w: 100, h: 40},
    {x: 200, y: 400, w: 150, h: 40}
];

let keys = {};
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// Gaget va Ulta tugmalari
window.addEventListener('keydown', e => {
    if(e.key.toLowerCase() === 'g') player.gadgetActive = true;
    if(e.key.toLowerCase() === 'q') shoot(true); // Ulta
});

canvas.addEventListener('mousedown', () => shoot(false));

function shoot(isUltra) {
    if (player.ammo > 0 || isUltra) {
        const count = isUltra ? 12 : (player.gadgetActive ? 1 : 6);
        const color = isUltra ? '#facc15' : (player.gadgetActive ? '#f59e0b' : 'white');
        
        for(let i = 0; i < count; i++) {
            setTimeout(() => {
                bullets.push({
                    x: player.x + player.w/2,
                    y: player.y + player.h/2,
                    vx: 10, vy: (Math.random() - 0.5) * 2,
                    isPiercing: isUltra || player.gadgetActive,
                    color: color
                });
            }, i * 100);
        }
        
        if(!isUltra) {
            player.ammo--;
            player.gadgetActive = false;
        }
    }
}

function update() {
    // Harakat
    if(keys['w'] && player.y > 0) player.y -= player.speed;
    if(keys['s'] && player.y < canvas.height - player.h) player.y += player.speed;
    if(keys['a'] && player.x > 0) player.x -= player.speed;
    if(keys['d'] && player.x < canvas.width - player.w) player.x += player.speed;

    // Reload tizimi
    if(player.ammo < 3) {
        player.reloadTimer++;
        if(player.reloadTimer > 60) {
            player.ammo++;
            player.reloadTimer = 0;
        }
    }

    // O'qlarni yangilash
    bullets.forEach((b, bIdx) => {
        b.x += b.vx;
        b.y += b.vy;

        // Devor bilan to'qnashuv
        walls.forEach((w, wIdx) => {
            if(b.x > w.x && b.x < w.x + w.w && b.y > w.y && b.y < w.y + w.h) {
                if(b.isPiercing) {
                    walls.splice(wIdx, 1); // Devorni buzish
                } else {
                    bullets.splice(bIdx, 1); // Oq to'xtaydi
                }
            }
        });
    });

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Devorlar
    ctx.fillStyle = '#475569';
    walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

    // Colt (O'yinchi)
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.w, player.h);

    // Health bar (Brawl Stars uslubida)
    ctx.fillStyle = 'black';
    ctx.fillRect(player.x - 5, player.y - 15, 40, 6);
    ctx.fillStyle = '#22c55e';
    ctx.fillRect(player.x - 5, player.y - 15, (player.hp / player.maxHp) * 40, 6);

    // O'qlar
    bullets.forEach(b => {
        ctx.fillStyle = b.color;
        ctx.beginPath();
        ctx.arc(b.x, b.y, 4, 0, Math.PI*2);
        ctx.fill();
    });

    // UI Yangilash
    document.getElementById('hp-text').innerText = `HP: ${player.hp}`;
    document.getElementById('ammo-text').innerText = `Ammo: ${"|".repeat(player.ammo)}`;
    document.getElementById('gadget-text').style.opacity = player.gadgetActive ? "1" : "0.5";
}

update();
</script>
</body>
</html>
