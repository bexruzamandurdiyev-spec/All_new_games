<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Mini: Aim & Fire</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            touch-action: none;
            font-family: 'Courier New', Courier, monospace;
            color: white;
        }

        #ui { margin-top: 15px; font-size: 24px; font-weight: bold; text-shadow: 0 0 10px #ff00ff; z-index: 10; }

        canvas { 
            background: #050505; 
            border: 3px solid #00ffff; 
            border-radius: 15px; 
            box-shadow: 0 0 20px #00ffff;
            margin-top: 15px;
            display: block;
        }

        /* Mobil Boshqaruv (Neon Joystik va Mo'ljallash) */
        .controls { 
            position: fixed; 
            bottom: 30px; 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            padding: 0 40px; 
            z-index: 20;
        }

        #joystick { 
            width: 100px; 
            height: 100px; 
            background: rgba(0,255,255,0.05); 
            border: 3px solid #00ffff; 
            border-radius: 50%; 
            position: relative; 
            box-shadow: 0 0 15px #00ffff;
        }

        #joystick-thumb { 
            width: 50px; 
            height: 50px; 
            background: #00ffff; 
            border-radius: 50%; 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            box-shadow: 0 0 20px #00ffff;
        }

        #aimBtn { 
            width: 100px; 
            height: 100px; 
            background: rgba(255,0,255,0.05); 
            border: 4px solid #ff00ff; 
            border-radius: 50%; 
            color: #ff00ff; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            font-size: 18px;
            text-shadow: 0 0 10px #ff00ff;
            box-shadow: 0 0 20px #ff00ff;
            user-select: none;
            position: relative;
        }

        #aimBtn-thumb { 
            width: 40px; 
            height: 40px; 
            background: #ff00ff; 
            border-radius: 50%; 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            box-shadow: 0 0 20px #ff00ff;
            opacity: 0.5;
        }

        /* Yutqazish Paneli */
        #losePanel { 
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: rgba(0,0,0,0.9); 
            padding: 40px; 
            border-radius: 20px; 
            border: 4px solid #ff0000; 
            text-align: center; 
            z-index: 100; 
            box-shadow: 0 0 30px #ff0000;
        }

        #losePanel h2 { color: #ff0000; font-size: 32px; margin-bottom: 10px; text-shadow: 0 0 15px #ff0000; }
        #losePanel p { color: white; font-size: 18px; margin-bottom: 20px; }
        .restart-btn { 
            padding: 12px 25px; 
            background: #ff0000; 
            border: none; 
            color: white; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            box-shadow: 0 0 10px #ff0000; 
        }

    </style>
</head>
<body>

    <div id="ui">SCORE: <span id="score">0</span></div>
    <canvas id="game"></canvas>

    <div id="losePanel">
        <h2>O'YIN TUGADI!</h2>
        <p>Ballingiz: <span id="finalScore">0</span></p>
        <button class="restart-btn" onclick="location.reload()">QAYTA URINISH</button>
    </div>

    <div class="controls">
        <div id="joystick"><div id="joystick-thumb"></div></div>
        
        <div id="aimBtn">OTISH<div id="aimBtn-thumb"></div></div>
    </div>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const finalScoreEl = document.getElementById("finalScore");
        const losePanel = document.getElementById("losePanel");
        const thumb = document.getElementById("joystick-thumb");
        const aimThumb = document.getElementById("aimBtn-thumb");

        // O'yin o'lchamini telefon ekraniga moslash
        canvas.width = window.innerWidth - 30;
        canvas.height = window.innerHeight * 0.55;

        // O'yin elementlari
        let player = { x: canvas.width/2, y: canvas.height/2, r: 15, color: '#00ffff' };
        let enemies = [];
        let bullets = [];
        let score = 0;
        let gameActive = true;

        // Yurish joystiki mantiqi
        let joystickActive = false;
        let startX, startY;
        let moveX = 0, moveY = 0;

        // Mo'ljallash joystiki mantiqi
        let aimActive = false;
        let aimStartX, aimStartY;
        let aimDX = 0, aimDY = 0;

        // Universal touch boshqaruvi
        window.addEventListener('pointerdown', (e) => {
            if (!gameActive) return;
            // Yurish joystiki (Chapda)
            if (e.target.id === 'joystick' || e.target.id === 'joystick-thumb') {
                joystickActive = true;
                startX = e.clientX;
                startY = e.clientY;
            }
            // Mo'ljallash joystiki (O'ngda)
            if (e.target.id === 'aimBtn' || e.target.id === 'aimBtn-thumb') {
                aimActive = true;
                aimStartX = e.clientX;
                aimStartY = e.clientY;
                aimThumb.style.opacity = '1';
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (!gameActive) return;
            // Yurish joystiki
            if (joystickActive) {
                let dx = e.clientX - startX;
                let dy = e.clientY - startY;
                let dist = Math.sqrt(dx*dx + dy*dy);
                let maxDist = 40;
                if (dist > maxDist) { dx *= maxDist / dist; dy *= maxDist / dist; }
                thumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                moveX = dx / maxDist;
                moveY = dy / maxDist;
            }
            // Mo'ljallash joystiki
            if (aimActive) {
                aimDX = e.clientX - aimStartX;
                aimDY = e.clientY - aimStartY;
                let dist = Math.sqrt(aimDX*aimDX + aimDY*aimDY);
                let maxDist = 40;
                if (dist > maxDist) { aimDX *= maxDist / dist; aimDY *= maxDist / dist; }
                aimThumb.style.transform = `translate(calc(-50% + ${aimDX}px), calc(-50% + ${aimDY}px))`;
            }
        });

        window.addEventListener('pointerup', (e) => {
            // Yurish joystiki
            if (joystickActive) {
                joystickActive = false;
                thumb.style.transform = 'translate(-50%, -50%)';
                moveX = 0; moveY = 0;
            }
            // Mo'ljallash joystiki (Qo'yib yuborganda otadi)
            if (aimActive) {
                // Agar barmoq qimirlagan bo'lsa (mo'ljal olgan bo'lsa)
                let dist = Math.sqrt(aimDX*aimDX + aimDY*aimDY);
                if (dist > 10) { 
                    let angle = Math.atan2(aimDY, aimDX);
                    bullets.push({ x: player.x, y: player.y, vx: Math.cos(angle)*9, vy: Math.sin(angle)*9 });
                } else {
                    // Shunchaki bossa, tepadagi dushmanga otadi
                    bullets.push({ x: player.x, y: player.y, vx: 0, vy: -9 });
                }
                aimActive = false;
                aimDX = 0; aimDY = 0;
                aimThumb.style.transform = 'translate(-50%, -50%)';
                aimThumb.style.opacity = '0.5';
            }
        });

        // Dushmanlar spawn
        function spawnEnemy() {
            if (!gameActive) return;
            enemies.push({ x: Math.random()*canvas.width, y: 0, r: 12, color: '#ff00ff' });
        }
        setInterval(spawnEnemy, 1800);

        function gameOver() {
            gameActive = false;
            finalScoreEl.innerText = score;
            losePanel.style.display = "block";
            ctx.fillStyle = "rgba(0,0,0,0.8)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function update() {
            if (!gameActive) return;

            // O'yinchi harakati (Silliq va to'xtamaydi)
            player.x += moveX * 3.8;
            player.y += moveY * 3.8;

            // Xaritadan chiqib ketmaslik
            if (player.x < 15) player.x = 15;
            if (player.x > canvas.width - 15) player.x = canvas.width - 15;
            if (player.y < 15) player.y = 15;
            if (player.y > canvas.height - 15) player.y = canvas.height - 15;

            bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                if(b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(i, 1);
            });

            enemies.forEach((en, ei) => {
                let dx = player.x - en.x;
                let dy = player.y - en.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                en.x += dx/dist * 1.8;
                en.y += dy/dist * 1.8;

                if (dist < player.r + en.r) { gameOver(); }

                bullets.forEach((b, bi) => {
                    let d = Math.sqrt((b.x-en.x)**2 + (b.y-en.y)**2);
                    if (d < en.r) {
                        enemies.splice(ei, 1);
                        bullets.splice(bi, 1);
                        score += 10;
                        scoreEl.innerText = score;
                    }
                });
            });
        }

        function draw() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Neon effektlari
            ctx.shadowBlur = 15;

            // O'yinchi
            ctx.fillStyle = player.color;
            ctx.shadowColor = player.color;
            ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill();

            // Mo'ljallash chizig'i (Otish paytida)
            if (aimActive) {
                let dist = Math.sqrt(aimDX*aimDX + aimDY*aimDY);
                if (dist > 10) {
                    let angle = Math.atan2(aimDY, aimDX);
                    ctx.strokeStyle = "rgba(255, 0, 255, 0.5)";
                    ctx.shadowColor = "#ff00ff";
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(player.x, player.y);
                    ctx.lineTo(player.x + Math.cos(angle)*80, player.y + Math.sin(angle)*80);
                    ctx.stroke();
                }
            }

            // Dushmanlar
            ctx.fillStyle = "#ff00ff";
            ctx.shadowColor = "#ff00ff";
            enemies.forEach(en => {
                ctx.beginPath(); ctx.arc(en.x, en.y, en.r, 0, Math.PI*2); ctx.fill();
            });

            // O'qlar
            ctx.fillStyle = "#fbbf24";
            ctx.shadowColor = "#fbbf24";
            bullets.forEach(b => {
                ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, Math.PI*2); ctx.fill();
            });

            ctx.shadowBlur = 0; // Boshqa elementlar uchun neonni o'chirish

            update();
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
