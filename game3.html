<!DOCTYPE html>
<html>
<head>
    <title>Brawl Mini - 1v1 Local</title>
    <style>
        body { margin: 0; background: #0f172a; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        canvas { background: #1e293b; border: 4px solid #334155; border-radius: 15px; touch-action: none; }
        #ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; color: white; pointer-events: none; }
        .hp-bar { width: 120px; height: 12px; background: #450a0a; border: 2px solid #000; border-radius: 6px; overflow: hidden; }
        .hp-fill { height: 100%; background: #22c55e; }
    </style>
</head>
<body>

<div id="ui">
    <div>
        <div>O'yinchi 1 (WASD + G)</div>
        <div class="hp-bar"><div id="hp1" class="hp-fill"></div></div>
    </div>
    <div>
        <div>O'yinchi 2 (Yo'nalishlar + L)</div>
        <div class="hp-bar"><div id="hp2" class="hp-fill"></div></div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = 800;
canvas.height = 500;

// O'yinchilar sozlamalari
let p1 = { x: 100, y: 250, w: 35, h: 35, hp: 3200, color: '#4f46e5', ammo: 3, reload: 0 };
let p2 = { x: 650, y: 250, w: 35, h: 35, hp: 3200, color: '#e11d48', ammo: 3, reload: 0 };

let bullets = [];
let walls = [
    {x: 380, y: 100, w: 40, h: 100},
    {x: 380, y: 300, w: 40, h: 100}
];

let keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function shoot(p, direction) {
    if (p.ammo > 0) {
        bullets.push({
            x: p.x + p.w/2,
            y: p.y + p.h/2,
            vx: direction * 10,
            owner: p
        });
        p.ammo--;
    }
}

// Har 1 soniyada o'qlar to'ladi
function reloadSystem(p) {
    if(p.ammo < 3) {
        p.reload++;
        if(p.reload > 60) { p.ammo++; p.reload = 0; }
    }
}

function update() {
    // P1 Harakat (WASD)
    if(keys['KeyW'] && p1.y > 0) p1.y -= 5;
    if(keys['KeyS'] && p1.y < canvas.height - p1.h) p1.y += 5;
    if(keys['KeyA'] && p1.x > 0) p1.x -= 5;
    if(keys['KeyD'] && p1.x < 350) p1.x += 5; // P1 o'z tomonida qoladi
    if(keys['KeyG']) { shoot(p1, 1); keys['KeyG'] = false; } // Otish

    // P2 Harakat (Yo'nalish tugmalari)
    if(keys['ArrowUp'] && p2.y > 0) p2.y -= 5;
    if(keys['ArrowDown'] && p2.y < canvas.height - p2.h) p2.y += 5;
    if(keys['ArrowLeft'] && p2.x > 450) p2.x -= 5;
    if(keys['ArrowRight'] && p2.x < canvas.width - p2.w) p2.x += 5;
    if(keys['KeyL']) { shoot(p2, -1); keys['KeyL'] = false; } // Otish

    reloadSystem(p1);
    reloadSystem(p2);

    // O'qlarni yangilash
    bullets.forEach((b, bIdx) => {
        b.x += b.vx;

        // Devorga tegsa
        walls.forEach(w => {
            if(b.x > w.x && b.x < w.x + w.w && b.y > w.y && b.y < w.y + w.h) {
                bullets.splice(bIdx, 1);
            }
        });

        // O'yinchiga tegsa
        if(b.owner === p1 && b.x > p2.x && b.x < p2.x + p2.w && b.y > p2.y && b.y < p2.y + p2.h) {
            p2.hp -= 400;
            bullets.splice(bIdx, 1);
        }
        if(b.owner === p2 && b.x > p1.x && b.x < p1.x + p1.w && b.y > p1.y && b.y < p1.y + p1.h) {
            p1.hp -= 400;
            bullets.splice(bIdx, 1);
        }
    });

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Maydonni bo'lish
    ctx.strokeStyle = '#334155';
    ctx.setLineDash([10, 10]);
    ctx.beginPath(); ctx.moveTo(400, 0); ctx.lineTo(400, 500); ctx.stroke();
    ctx.setLineDash([]);

    // Devorlar
    ctx.fillStyle = '#475569';
    walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

    // O'yinchilar
    ctx.fillStyle = p1.color; ctx.fillRect(p1.x, p1.y, p1.w, p1.h);
    ctx.fillStyle = p2.color; ctx.fillRect(p2.x, p2.y, p2.w, p2.h);

    // O'qlar
    bullets.forEach(b => {
        ctx.fillStyle = 'white';
        ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();
    });

    // UI yangilash
    document.getElementById('hp1').style.width = (p1.hp / 3200 * 100) + "%";
    document.getElementById('hp2').style.width = (p2.hp / 3200 * 100) + "%";
}

update();
</script>
</body>
</html>
