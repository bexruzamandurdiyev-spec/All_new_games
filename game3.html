<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Mini: Perfect Edition</title>
    <style>
        body { margin: 0; background: #020617; overflow: hidden; touch-action: none; font-family: 'Segoe UI', sans-serif; user-select: none; }
        canvas { display: block; background: #0f172a; }
        
        /* Joysticklar */
        .joystick { position: absolute; width: 80px; height: 80px; background: rgba(255,255,255,0.05); border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); z-index: 10; }
        .handle { position: absolute; width: 34px; height: 34px; background: rgba(255,255,255,0.4); border-radius: 50%; top: 23px; left: 23px; pointer-events: none; }
        
        /* Tugmalar */
        .btn { position: absolute; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; border: 2px solid #000; z-index: 10; cursor: pointer; box-shadow: 0 4px #000; font-size: 9px; text-align: center; }
        .btn:active { transform: scale(0.9); box-shadow: 0 2px #000; }
        
        #move1 { bottom: 20px; left: 20px; } #aim1 { bottom: 20px; left: 115px; border-color: #ef4444; }
        #g1 { bottom: 105px; left: 20px; background: #f59e0b; } #u1 { bottom: 105px; left: 115px; background: #eab308; }
        
        #move2 { bottom: 20px; right: 115px; } #aim2 { bottom: 20px; right: 20px; border-color: #3b82f6; }
        #g2 { bottom: 105px; right: 115px; background: #f59e0b; } #u2 { bottom: 105px; right: 20px; background: #eab308; }

        /* G'alaba ekrani */
        #win { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 100; }
        #win h1 { font-size: 40px; margin-bottom: 20px; text-shadow: 0 0 20px #fff; }
        #win button { padding: 12px 30px; font-size: 18px; font-weight: bold; background: #22c55e; border: none; border-radius: 8px; color: white; cursor: pointer; }
    </style>
</head>
<body>

<div id="win"><h1 id="winTxt">G'ALABA!</h1><button onclick="location.reload()">QAYTA O'YNASH</button></div>
<canvas id="game"></canvas>

<div class="joystick" id="move1"><div class="handle"></div></div>
<div class="joystick" id="aim1"><div class="handle"></div></div>
<div class="btn" id="g1">GADGET</div><div class="btn" id="u1">ULTRA</div>

<div class="joystick" id="move2"><div class="handle"></div></div>
<div class="joystick" id="aim2"><div class="handle"></div></div>
<div class="btn" id="g2">GADGET</div><div class="btn" id="u2">ULTRA</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const R = 22; 
let gameOver = false;
let keys = {};

window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => {
    keys[e.code] = false;
    if(e.code === 'Space') shoot(p1);
    if(e.code === 'Enter') shoot(p2);
    if(e.code === 'KeyQ') useUltra(p1);
    if(e.code === 'KeyM') useUltra(p2);
    if(e.code === 'KeyE') useGadget(p1);
    if(e.code === 'KeyK') useGadget(p2);
};

function createPlayer(id, x, c) {
    return { id, x, y: canvas.height/2, c, hp: 3200, ammo: 3, vx: 0, vy: 0, ang: id===1?0:Math.PI, super: 0, gadget: 3, isAim: false };
}

let p1 = createPlayer(1, 150, '#ef4444');
let p2 = createPlayer(2, canvas.width - 150, '#3b82f6');
let bullets = [];
let walls = [
    {x: canvas.width/2 - 25, y: 150, w: 50, h: 200},
    {x: canvas.width/2 - 25, y: canvas.height - 350, w: 50, h: 200}
];

// O'q otish funksiyasi
function shoot(p, isG = false, isS = false) {
    if(gameOver || (!isS && p.ammo < 1)) return;
    bullets.push({
        x: p.x, y: p.y,
        vx: Math.cos(p.ang) * (isS ? 15 : 12),
        vy: Math.sin(p.ang) * (isS ? 15 : 12),
        owner: p, isG, isS,
        color: isS ? '#facc15' : (isG ? '#f59e0b' : 'white')
    });
    if(!isS) p.ammo--;
}

function useGadget(p) { if(p.gadget > 0) { p.gadget--; shoot(p, true); } }
function useUltra(p) { 
    if(p.super >= 100) { 
        p.super = 0; 
        for(let i=0; i<8; i++) setTimeout(() => shoot(p, true, true), i * 100);
    } 
}

// Joystick sozlamalari
function setupJoy(id, p, type) {
    const el = document.getElementById(id);
    const h = el.querySelector('.handle');
    el.addEventListener('touchstart', e => { e.preventDefault(); if(type==='aim') p.isAim = true; });
    el.addEventListener('touchmove', e => {
        e.preventDefault();
        const t = e.touches[0];
        const rect = el.getBoundingClientRect();
        let dx = t.clientX - (rect.left + 40);
        let dy = t.clientY - (rect.top + 40);
        const d = Math.sqrt(dx*dx + dy*dy);
        if(d > 35) { dx *= 35/d; dy *= 35/d; }
        h.style.transform = `translate(${dx}px, ${dy}px)`;
        p.ang = Math.atan2(dy, dx);
        if(type === 'move') { p.vx = (dx/35)*5; p.vy = (dy/35)*5; }
    });
    el.addEventListener('touchend', () => {
        h.style.transform = 'translate(0,0)';
        if(type === 'aim') { shoot(p); p.isAim = false; }
        else { p.vx = 0; p.vy = 0; }
    });
}

setupJoy('move1', p1, 'move'); setupJoy('aim1', p1, 'aim');
setupJoy('move2', p2, 'move'); setupJoy('aim2', p2, 'aim');
document.getElementById('g1').onclick = () => useGadget(p1);
document.getElementById('u1').onclick = () => useUltra(p1);
document.getElementById('g2').onclick = () => useGadget(p2);
document.getElementById('u2').onclick = () => useUltra(p2);

function isWall(nx, ny) {
    for(let w of walls) {
        if(nx+R > w.x && nx-R < w.x+w.w && ny+R > w.y && ny-R < w.y+w.h) return true;
    }
    return false;
}

function update() {
    if(gameOver) return;

    [p1, p2].forEach(p => {
        // Klaviatura harakati (agar joystick bo'sh boolsa)
        let mx = p.vx, my = p.vy;
        if(!mx && !my) {
            if(p.id===1) {
                if(keys['KeyW']) my=-5; if(keys['KeyS']) my=5;
                if(keys['KeyA']) mx=-5; if(keys['KeyD']) mx=5;
            } else {
                if(keys['ArrowUp']) my=-5; if(keys['ArrowDown']) my=5;
                if(keys['ArrowLeft']) mx=-5; if(keys['ArrowRight']) mx=5;
            }
        }

        if(mx || my) {
            if(!p.isAim) p.ang = Math.atan2(my, mx);
            if(!isWall(p.x + mx, p.y)) p.x += mx;
            if(!isWall(p.x, p.y + my)) p.y += my;
        }

        p.x = Math.max(R, Math.min(canvas.width-R, p.x));
        p.y = Math.max(R, Math.min(canvas.height-R, p.y));
        if(p.ammo < 3) p.ammo += 0.015;

        if(p.hp <= 0) {
            gameOver = true;
            document.getElementById('win').style.display = 'flex';
            document.getElementById('winTxt').innerText = (p.id === 1 ? "KO'K" : "QIZIL") + " G'ALABA QILDI!";
            document.getElementById('winTxt').style.color = p.id === 1 ? "#3b82f6" : "#ef4444";
        }
    });

    bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        let enemy = b.owner === p1 ? p2 : p1;
        if(Math.hypot(b.x-enemy.x, b.y-enemy.y) < R) {
            enemy.hp -= 400; b.owner.super = Math.min(100, b.owner.super + 15);
            bullets.splice(i, 1);
        }
        walls.forEach((w, wi) => {
            if(b.x > w.x && b.x < w.x+w.w && b.y > w.y && b.y < w.y+w.h) {
                if(b.isG || b.isS) walls.splice(wi, 1);
                bullets.splice(i, 1);
            }
        });
        if(b.x<0 || b.x>canvas.width || b.y<0 || b.y>canvas.height) bullets.splice(i,1);
    });

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#334155'; walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));
    
    [p1, p2].forEach(p => {
        ctx.fillStyle = p.c; ctx.beginPath(); ctx.arc(p.x, p.y, R, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = p.super >= 100 ? '#facc15' : 'black'; ctx.lineWidth = 3; ctx.stroke();
        
        // UI
        ctx.fillStyle = 'black'; ctx.fillRect(p.x-25, p.y-45, 50, 6);
        ctx.fillStyle = '#22c55e'; ctx.fillRect(p.x-25, p.y-45, (Math.max(0, p.hp)/3200)*50, 6);
        ctx.fillStyle = '#facc15'; ctx.fillRect(p.x-25, p.y-37, (p.super/100)*50, 4);
        
        if(p.isAim) {
            ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.setLineDash([5,5]);
            ctx.beginPath(); ctx.moveTo(p.x, p.y);
            ctx.lineTo(p.x + Math.cos(p.ang)*100, p.y + Math.sin(p.ang)*100);
            ctx.stroke(); ctx.setLineDash([]);
        }
    });
    bullets.forEach(b => { ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, Math.PI*2); ctx.fill(); });
}
update();
</script>
</body>
</html>
