<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Interaktiv Tarix Testi</title>
    <style>
        :root {
            --dark: #0f172a;
            --gold: #fbbf24;
            --correct: #22c55e;
            --wrong: #ef4444;
            --card: #1e293b;
        }

        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--gold); font-size: 32px; margin-bottom: 5px; }

        /* Savol raqamlari paneli */
        .number-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 10px;
            max-width: 600px;
            margin-bottom: 40px;
        }

        .num-btn {
            width: 50px;
            height: 50px;
            background: var(--card);
            border: 2px solid #334155;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            transition: 0.3s;
        }

        .num-btn:hover { border-color: var(--gold); }
        .num-btn.answered { background: #334155; opacity: 0.6; border-color: var(--gold); }

        /* Test oynasi */
        .test-box {
            display: none;
            width: 100%;
            max-width: 700px;
            background: var(--card);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .question-text { font-size: 22px; margin-bottom: 25px; line-height: 1.4; border-left: 5px solid var(--gold); padding-left: 15px; }

        .options { display: grid; gap: 12px; }

        .option {
            background: #2d3748;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: 0.2s;
            border: 2px solid transparent;
        }

        .option:hover { background: #3d4a5d; }

        /* To'g'ri va noto'g'ri ranglar */
        .option.correct { background: var(--correct) !important; color: white; font-weight: bold; }
        .option.wrong { background: var(--wrong) !important; color: white; }
        
        .disabled { pointer-events: none; }

        .result-msg { margin-top: 20px; font-weight: bold; font-size: 18px; display: none; }
        
        .close-test { margin-top: 25px; background: var(--gold); color: black; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>XIII-XV Asrlar Madaniyati: Test</h1>
        <p>Savol raqamini tanlang va to'g'ri javobni belgilang</p>
    </div>

    <div class="number-grid" id="numGrid"></div>

    <div class="test-box" id="testBox">
        <div class="question-text" id="qText"></div>
        <div class="options" id="optContainer"></div>
        <div class="result-msg" id="resMsg"></div>
        <button class="close-test" onclick="hideTest()">Savollar ro'yxatiga qaytish</button>
    </div>

    <script>
        const questions = [
            { q: "Mirzo Ulug'bek tomonidan yozilgan eng mashhur astronomik asar qaysi?", a: "Ziji Jadidi Ko'ragoniy", b: "Zafarnoma", c: "Xamsa", correct: "a" },
            { q: "Turkiy tilda 'Xamsa' yaratgan birinchi shoir kim?", a: "Firdavsiy", b: "Alisher Navoiy", c: "Lutfiy", correct: "b" },
            { q: "Tarixdagi eng boy inson sanalgan Mali imperatori?", a: "Mansa Musa", b: "Ibn Battuta", c: "Sundiata Keyta", correct: "a" },
            { q: "Inklar davlatida tugunli iplardan iborat yozuv tizimi nima deyiladi?", a: "Iyeroglif", b: "Kip (Quipu)", c: "Piktogramma", correct: "b" },
            { q: "Asteklarning suv ustida qurilgan mahobatli poytaxti nomi?", a: "Machu Pikchu", b: "Chichen Itsa", c: "Tenochtitlan", correct: "c" },
            { q: "Matematikada 'Nol' raqamini kashf etgan Amerika xalqi?", a: "Inklar", b: "Mayyalar", c: "Asteklar", correct: "b" },
            { q: "Dehli sultonligida qurilgan eng baland g'ishtli minora?", a: "Qutub Minor", b: "Kalon minorasi", c: "Esh minorasi", correct: "a" },
            { q: "Hirot miniatyura maktabining eng buyuk vakili?", a: "Kamoliddin Behzod", b: "Mani", c: "Rizo Abbosiy", correct: "a" },
            { q: "O'nli kasrlarni birinchi bo'lib fanga kiritgan Samarqandlik olim?", a: "Ali Qushchi", b: "Jamshid al-Koshiy", c: "Mirzo Ulug'bek", correct: "b" },
            { q: "And tog'larida joylashgan Inkalarning 'yo'qolgan shahri'?", a: "Kusko", b: "Machu Pikchu", c: "Teno", correct: "b" },
            { q: "Afrika me'morchiligida loy ishlatmay toshdan qurilgan shahar?", a: "Timbuktu", b: "Qohira", c: "Buyuk Zimbabve", correct: "c" },
            { q: "Amir Temur davrida Samarqandda qurilgan eng ulkan masjid?", a: "Bibixonim", b: "Hazrati Imom", c: "Ko'k Gumbaz", correct: "a" },
            { q: "XV asrda Xitoyda yaratilgan ulkan ensiklopediya?", a: "Yongle", b: "Sun", c: "Min", correct: "a" },
            { q: "Afrikadagi Sankore universiteti qaysi ilm-fan shahrida joylashgan?", a: "Mogadisho", b: "Timbuktu", c: "Marokash", correct: "b" },
            { q: "XV asrda dengizlar orqali sayohat qilgan Xitoy admirali?", a: "Konfutsiy", b: "Chjen Xe", c: "Lao Szi", correct: "b" },
            { q: "Amir Temur hayotiga bag'ishlangan Sharafiddin Ali Yazdiy asari?", a: "Zafarnoma", b: "Tarixi Rashidiy", c: "Boburnoma", correct: "a" },
            { q: "Mayyalarning piramidasi qanday asosiy vazifani bajargan?", a: "Saroy", b: "Taqvim/Kalendar", c: "Kutubxona", correct: "b" },
            { q: "Registon maydonidagi birinchi madrasani kim qurdirgan?", a: "Amir Temur", b: "Mirzo Ulug'bek", c: "Yalangto'sh Bahodir", correct: "b" },
            { q: "G'arbiy Afrikadagi yetti shahar-davlatdan iborat sivilizatsiya?", a: "Havsa", b: "Mali", c: "Songay", correct: "a" },
            { q: "Sharqdan Ipak yo'li orqali G'arbga o'tgan eng muhim ixtirolar?", a: "Kompyuter", b: "Qog'oz va Porox", c: "Avtomobil", correct: "b" }
        ];

        const numGrid = document.getElementById('numGrid');
        const testBox = document.getElementById('testBox');
        const qText = document.getElementById('qText');
        const optContainer = document.getElementById('optContainer');
        const resMsg = document.getElementById('resMsg');

        // Raqamlarni yaratish
        questions.forEach((_, i) => {
            const btn = document.createElement('button');
            btn.className = 'num-btn';
            btn.id = 'btn-' + i;
            btn.innerText = i + 1;
            btn.onclick = () => showQuestion(i);
            numGrid.appendChild(btn);
        });

        function showQuestion(index) {
            const question = questions[index];
            qText.innerText = (index + 1) + ". " + question.q;
            resMsg.style.display = 'none';
            optContainer.innerHTML = '';
            numGrid.style.display = 'none';
            testBox.style.display = 'block';

            // Variantlarni yaratish
            const options = [
                { id: 'a', text: question.a },
                { id: 'b', text: question.b },
                { id: 'c', text: question.c }
            ];

            options.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'option';
                div.innerText = opt.id.toUpperCase() + ") " + opt.text;
                div.onclick = () => checkAnswer(div, opt.id, question.correct, index);
                optContainer.appendChild(div);
            });
        }

        function checkAnswer(element, selected, correct, index) {
            const allOptions = document.querySelectorAll('.option');
            allOptions.forEach(o => o.classList.add('disabled'));

            if (selected === correct) {
                element.classList.add('correct');
                resMsg.innerText = "To'g'ri topdingiz! Barakalla.";
                resMsg.style.color = "var(--correct)";
            } else {
                element.classList.add('wrong');
                allOptions.forEach(o => {
                    if(o.innerText.toLowerCase().startsWith(correct)) o.classList.add('correct');
                });
                resMsg.innerText = "Noto'g'ri. To'g'ri javob ko'rsatildi.";
                resMsg.style.color = "var(--wrong)";
            }
            resMsg.style.display = 'block';
            document.getElementById('btn-' + index).classList.add('answered');
        }

        function hideTest() {
            testBox.style.display = 'none';
            numGrid.style.display = 'grid';
        }
    </script>
</body>
</html>
