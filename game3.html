<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Mobile - Lucky Spin</title>
    <style>
        :root {
            --primary: #ffcc00;
            --bg: #0f0f1a;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #1e1e2f, #0f0f1a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 350px;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { color: var(--primary); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
            border-bottom: 2px solid var(--primary);
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            border-radius: 8px;
            border: none;
            background: var(--primary);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--primary); }

        /* Wheel Styles */
        .wheel-wrapper {
            position: relative;
            width: 260px;
            height: 260px;
            margin: 20px auto;
            border: 8px solid #333;
            border-radius: 50%;
            box-shadow: 0 0 20px var(--primary);
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1);
            background: #222;
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 40px;
            background: #ff0000;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
        }

        .segment {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: bottom right;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            clip-path: polygon(0 0, 100% 0, 100% 100%);
        }

        .segment span {
            transform: rotate(-45deg) translateY(-20px);
            text-shadow: 1px 1px 2px #000;
        }

        #result-text {
            margin-top: 15px;
            font-weight: bold;
            color: #00ff00;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="container" id="main-card">
        <div id="auth-box">
            <h2>Lucky Spin</h2>
            <p style="font-size: 13px; opacity: 0.8;">Sovg'alarni yutib olish uchun ma'lumotlarni tasdiqlang</p>
            <input type="text" id="nickname" placeholder="O'yin Nickname-ingiz">
            <input type="number" id="level" placeholder="Darajangiz (Level)">
            <button onclick="enterGame()">Kirish</button>
        </div>

        <div id="game-box" style="display:none;">
            <h3 id="user-display"></h3>
            <div class="wheel-wrapper">
                <div class="pointer"></div>
                <div id="wheel" class="wheel">
                    </div>
            </div>
            <button id="spin-btn" onclick="spinNow()">Aylantirish</button>
            <p id="result-text"></p>
        </div>
    </div>

    <script>
        const prizes = [
            { text: "M416 Glacier", color: "#4d94ff" },
            { text: "660 UC", color: "#ffd700" },
            { text: "Mythic Outfit", color: "#ff00ff" },
            { text: "960 UC", color: "#ffd700" },
            { text: "Crow Set", color: "#333" },
            { text: "Material", color: "#00ff00" }
        ];

        const wheel = document.getElementById('wheel');
        
        // G'ildirakni yaratish
        prizes.forEach((prize, i) => {
            const seg = document.createElement('div');
            seg.className = 'segment';
            seg.style.setProperty('--i', i);
            seg.style.transform = `rotate(${i * 60}deg)`;
            seg.style.backgroundColor = prize.color;
            seg.innerHTML = `<span>${prize.text}</span>`;
            wheel.appendChild(seg);
        });

        function enterGame() {
            const nick = document.getElementById('nickname').value;
            const lvl = document.getElementById('level').value;

            if(nick.length > 2 && lvl > 0) {
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('game-box').style.display = 'block';
                document.getElementById('user-display').innerText = `Omad, ${nick}!`;
            } else {
                alert("Iltimos, ma'lumotlarni to'g'ri kiriting!");
            }
        }

        let isSpinning = false;
        function spinNow() {
            if (isSpinning) return;
            isSpinning = true;

            const btn = document.getElementById('spin-btn');
            const resultText = document.getElementById('result-text');
            btn.style.opacity = '0.5';
            btn.disabled = true;

            const extraDeg = Math.floor(Math.random() * 360);
            const totalDeg = 3600 + extraDeg; // 10 marta to'liq aylanish + tasodifiy nuqta

            wheel.style.transform = `rotate(${totalDeg}deg)`;

            setTimeout(() => {
                resultText.innerHTML = "Tabriklaymiz! Sovg'angiz tizimda band qilindi.<br><small>3-4 kun ichida ID raqamingizga yuboriladi.</small>";
                
                // Effekt uchun ekranga konfeti kabi animatsiya qo'shish mumkin
                confettiEffect();
            }, 5000);
        }

        function confettiEffect() {
            // Oddiygina miltillash effekti
            document.body.style.backgroundColor = "#1a1a2e";
            setTimeout(() => document.body.style.backgroundColor = "#0f0f1a", 200);
        }
    </script>
</body>
</html>
