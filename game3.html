<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Mini - Colt Multiplayer</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; background: #0f172a; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Arial', sans-serif; }
        canvas { background: #1e293b; border: 5px solid #334155; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; text-shadow: 2px 2px 4px #000; }
        .bar { width: 150px; height: 15px; background: #450a0a; border: 2px solid #000; margin-bottom: 5px; border-radius: 10px; overflow: hidden; }
        .hp-fill { width: 100%; height: 100%; background: #22c55e; transition: width 0.3s; }
        .ammo-container { display: flex; gap: 5px; }
        .ammo-slot { width: 46px; height: 10px; background: #f59e0b; border: 1px solid #000; border-radius: 5px; }
        .ammo-empty { background: #451a03; }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-weight: bold; margin-bottom: 5px;">COLT</div>
    <div class="bar"><div id="hp-bar" class="hp-fill"></div></div>
    <div class="ammo-container" id="ammo-ui">
        <div class="ammo-slot"></div>
        <div class="ammo-slot"></div>
        <div class="ammo-slot"></div>
    </div>
    <div id="status" style="margin-top: 10px; color: #facc15;">Gadget: Ready (G)</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

canvas.width = 800;
canvas.height = 600;

// SERVERGA ULANISH (O'zingizning Render manzilingizni qo'ying)
const socket = io("https://SIZNING-SERVER-MANZILINGIZ.onrender.com");

let player = {
    x: Math.random() * 600 + 100,
    y: Math.random() * 400 + 100,
    w: 35, h: 35,
    hp: 3200, maxHp: 3200,
    ammo: 3, reloadTimer: 0,
    speed: 5, gadget: true,
    id: null
};

let otherPlayers = {};
let bullets = [];
let walls = [
    {x: 200, y: 150, w: 50, h: 150},
    {x: 550, y: 150, w: 50, h: 150},
    {x: 350, y: 280, w: 100, h: 40}
];

// Klaviaturani kuzatish
let keys = {};
window.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if(e.key.toLowerCase() === 'g' && player.gadget) activateGadget();
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// Gaget: Silver Bullet
function activateGadget() {
    player.gadget = false;
    document.getElementById('status').innerText = "Gadget: Used";
    shoot(false, true); // Keyingi o'q teshuvchi bo'ladi
}

canvas.addEventListener('mousedown', () => {
    if(player.ammo > 0) shoot(false, false);
});

// Otish mexanikasi
function shoot(isUltra, isPiercing) {
    if(!isUltra) player.ammo--;
    
    const bulletData = {
        x: player.x + player.w/2,
        y: player.y + player.h/2,
        isPiercing: isPiercing || isUltra,
        color: isUltra ? '#facc15' : (isPiercing ? '#f59e0b' : 'white'),
        ownerId: socket.id
    };

    // Serverga o'q haqida xabar yuborish
    socket.emit('shoot', bulletData);
    createBullet(bulletData);
}

function createBullet(data) {
    bullets.push({ ...data, vx: 12, vy: (Math.random() - 0.5) * 1 });
}

// SERVERDAN MA'LUMOTLARNI QABUL QILISH
socket.on('currentPlayers', (players) => {
    Object.keys(players).forEach(id => {
        if(id !== socket.id) otherPlayers[id] = players[id];
    });
});

socket.on('playerMoved', (data) => {
    if(otherPlayers[data.id]) {
        otherPlayers[data.id].x = data.x;
        otherPlayers[data.id].y = data.y;
    }
});

socket.on('enemyShoot', (data) => {
    createBullet(data);
});

socket.on('playerDisconnected', (id) => {
    delete otherPlayers[id];
});

function update() {
    // Harakat
    let moved = false;
    if(keys['w'] && player.y > 0) { player.y -= player.speed; moved = true; }
    if(keys['s'] && player.y < canvas.height - player.h) { player.y += player.speed; moved = true; }
    if(keys['a'] && player.x > 0) { player.x -= player.speed; moved = true; }
    if(keys['d'] && player.x < canvas.width - player.w) { player.x += player.speed; moved = true; }

    if(moved) {
        socket.emit('playerMovement', { x: player.x, y: player.y });
    }

    // Reload
    if(player.ammo < 3) {
        player.reloadTimer++;
        if(player.reloadTimer > 80) {
            player.ammo++;
            player.reloadTimer = 0;
        }
    }

    // O'qlarni yangilash
    bullets.forEach((b, bIdx) => {
        b.x += b.vx;
        
        // Devorlar bilan to'qnashuv
        walls.forEach((w, wIdx) => {
            if(b.x > w.x && b.x < w.x + w.w && b.y > w.y && b.y < w.y + w.h) {
                if(b.isPiercing) {
                    walls.splice(wIdx, 1); // Devorni buzish!
                } else {
                    bullets.splice(bIdx, 1);
                }
            }
        });
    });

    updateUI();
    draw();
    requestAnimationFrame(update);
}

function updateUI() {
    document.getElementById('hp-bar').style.width = (player.hp / player.maxHp * 100) + "%";
    const ammoSlots = document.querySelectorAll('.ammo-slot');
    ammoSlots.forEach((slot, i) => {
        if(i < player.ammo) slot.classList.remove('ammo-empty');
        else slot.classList.add('ammo-empty');
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Xarita to'ri
    ctx.strokeStyle = '#2d3748';
    for(let i=0; i<canvas.width; i+=40) {
        ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
    }

    // Devorlar
    ctx.fillStyle = '#4a5568';
    walls.forEach(w => {
        ctx.fillRect(w.x, w.y, w.w, w.h);
        ctx.strokeStyle = '#2d3748';
        ctx.strokeRect(w.x, w.y, w.w, w.h);
    });

    // O'zingiz (Colt)
    ctx.fillStyle = '#4f46e5';
    ctx.fillRect(player.x, player.y, player.w, player.h);

    // Raqiblar
    Object.keys(otherPlayers).forEach(id => {
        const p = otherPlayers[id];
        ctx.fillStyle = '#e11d48';
        ctx.fillRect(p.x, p.y, 35, 35);
    });

    // O'qlar
    bullets.forEach(b => {
        ctx.fillStyle = b.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = b.color;
        ctx.beginPath();
        ctx.arc(b.x, b.y, 5, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
    });
}

update();
</script>
</body>
</html>
