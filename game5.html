<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Mobile Fix</title>
    <style>
        /* Barcha elementlar uchun umumiy sozlama */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #121212;
            color: white;
            font-family: sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: none; /* Sahifa qimirlashini butunlay to'xtatadi */
        }

        .header {
            height: 10vh;
            display: flex;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            color: #4db8ff;
        }

        /* O'yin maydoni konteyneri */
        .game-container {
            width: 90vw;
            height: 45vh; /* Ekran yarmini egallaydi */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            border: 2px solid #4db8ff;
            background: #000;
            max-width: 100%;
            max-height: 100%;
            display: block;
        }

        /* Tugmalar maydoni */
        .controls {
            height: 40vh;
            display: grid;
            grid-template-columns: repeat(3, 75px);
            grid-template-rows: repeat(2, 75px);
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            width: 75px;
            height: 75px;
            background: #4db8ff;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px #007acc;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: none;
            background: #0099ff;
        }

        /* Tugmalar o'rni */
        .up { grid-column: 2; grid-row: 1; }
        .left { grid-column: 1; grid-row: 2; }
        .down { grid-column: 2; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

    <div class="header">Ball: <span id="scoreVal">0</span></div>

    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>

    <div class="controls">
        <button class="btn up" onpointerdown="changeDir('UP')">▲</button>
        <button class="btn left" onpointerdown="changeDir('LEFT')">◀</button>
        <button class="btn down" onpointerdown="changeDir('DOWN')">▼</button>
        <button class="btn right" onpointerdown="changeDir('RIGHT')">▶</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");

        let box = 20;
        let score = 0;
        let snake = [{x: 10 * box, y: 10 * box}];
        let food = { x: 5 * box, y: 5 * box };
        let d = "";

        function changeDir(direction) {
            if(direction == "LEFT" && d != "RIGHT") d = "LEFT";
            else if(direction == "UP" && d != "DOWN") d = "UP";
            else if(direction == "RIGHT" && d != "LEFT") d = "RIGHT";
            else if(direction == "DOWN" && d != "UP") d = "DOWN";
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for(let i = 0; i < snake.length; i++){
                ctx.fillStyle = (i == 0) ? "#00ff00" : "#008000";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
            }

            ctx.fillStyle = "red";
            ctx.fillRect(food.x, food.y, box, box);

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if( d == "LEFT") snakeX -= box;
            if( d == "UP") snakeY -= box;
            if( d == "RIGHT") snakeX += box;
            if( d == "DOWN") snakeY += box;

            if(snakeX == food.x && snakeY == food.y){
                score++;
                scoreElement.innerHTML = score;
                food = { 
                    x: Math.floor(Math.random()*19)*box, 
                    y: Math.floor(Math.random()*19)*box 
                };
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)){
                clearInterval(game);
                alert("O'yin tugadi!");
                location.reload();
            }
            snake.unshift(newHead);
        }

        function collision(head, array){
            for(let i = 0; i < array.length; i++){
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        let game = setInterval(draw, 150);
    </script>
</body>
</html>
