
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarixiy Ensiklopediya: 20 Fakt</title>
    <style>
        :root {
            --paper: #fdf5e6;
            --gold: #d4af37;
            --dark: #1a1a1a;
            --accent: #c0392b;
        }

        body {
            background-color: var(--dark);
            font-family: 'Georgia', serif;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: var(--gold); text-align: center; margin-bottom: 5px; text-transform: uppercase; }
        .sub { color: #bdc3c7; font-style: italic; margin-bottom: 40px; }

        /* Kartalar to'plami */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1300px;
        }

        .card {
            background: var(--paper);
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            min-height: 180px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .card:hover { transform: scale(1.05); background: white; }

        .card-num { color: var(--accent); font-weight: bold; opacity: 0.5; }
        .card-cat { font-size: 11px; text-transform: uppercase; color: var(--accent); letter-spacing: 1px; }
        .card-title { font-size: 20px; font-weight: bold; margin: 10px 0; color: #000; }
        .card-preview { font-size: 14px; color: #444; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        /* MODAL OYNA (Kattalashgan holat) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: var(--paper);
            width: 80%;
            max-width: 700px;
            padding: 50px;
            border-radius: 20px;
            position: relative;
            box-shadow: 0 0 50px var(--gold);
            animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .close-btn {
            position: absolute;
            top: 20px; right: 25px;
            font-size: 35px;
            color: var(--accent);
            cursor: pointer;
            font-weight: bold;
        }

        .modal-title { font-size: 35px; color: var(--accent); margin-bottom: 20px; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .modal-text { font-size: 22px; line-height: 1.6; color: #222; text-align: justify; }
        .modal-cat { color: var(--gold); font-weight: bold; text-transform: uppercase; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

    <h1>XIII - XV Asrlar Madaniyat Xazinasi</h1>
    <p class="sub">Kattalashtirish va batafsil o'qish uchun istalgan kartani bosing</p>

    <div class="grid" id="mainGrid"></div>

    <div class="modal" id="myModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <span class="modal-cat" id="mCat"></span>
            <div class="modal-title" id="mTitle"></div>
            <div class="modal-text" id="mText"></div>
            <button onclick="closeModal()" style="margin-top: 30px; padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px;">Ortga qaytish</button>
        </div>
    </div>

    <script>
        const facts = [
            { cat: "Movarounnahr", title: "Registon ansambli", text: "Samarqandning markaziy maydoni bo'lib, XIII-XV asrlarda u yerda dastlab Mirzo Ulug'bek madrasasi qad ko'targan. Bu maskan nafaqat diniy, balki dunyoviy fanlar o'qitiladigan o'sha davrning eng nufuzli universiteti vazifasini o'tagan." },
            { cat: "Astronomiya", title: "Ziji Jadidi Ko'ragoniy", text: "Mirzo Ulug'bek tomonidan yaratilgan bu asar 1018 ta yulduzning jadvalini o'z ichiga olgan. Ushbu ilmiy kashfiyot o'rta asrlarda osmon jismlari harakatini o'rganishdagi eng yuqori nuqta bo'lib, butun dunyo astronomlari uchun qo'llanma bo'lgan." },
            { cat: "Adabiyot", title: "Alisher Navoiy: 'Xamsa'", text: "Turkiy tilda yaratilgan birinchi 'Xamsa' bo'lib, beshta dostonni o'z ichiga oladi. Navoiy ushbu asari orqali o'zbek tilining boyligini va go'zalligini butun dunyoga namoyish etgan va adabiyot cho'qqisiga chiqqan." },
            { cat: "Hindiston", title: "Qutub Minor minorasi", text: "Dehli sultonligi davridagi eng yirik me'moriy obida. U o'sha vaqtdagi eng baland g'ishtli minora bo'lib, islom va hind me'morchilik uslublarining ajoyib sintezini o'zida aks ettiradi." },
            { cat: "Afrika", title: "Mansa Musaning boyligi", text: "Mali imperatori Mansa Musa tarixda eng boy inson sifatida tanilgan. Uning Makkaga haj safari davomida tarqatgan oltinlari Misr va Yaqin Sharqdagi oltin bozorlariga 12 yil davomida ta'sir ko'rsatgan." },
            { cat: "Ilm-fan", title: "Timbuktu ilmiy markazi", text: "G'arbiy Afrikadagi Timbuktu shahri XV asrda yirik ilm markazi edi. U yerdagi Sankore madrasasida 25 mingdan ortiq talaba huquq, astronomiya va tibbiyot kabi fanlarni o'rgangan." },
            { cat: "Amerika", title: "Mayya matematikasi", text: "Mayya xalqi matematika sohasida 'Nol' (0) tushunchasini kashf qilgan dunyodagi birinchi xalqlardan biridir. Bu ularga murakkab astronomik hisoblar va aniq taqvim yaratish imkonini bergan." },
            { cat: "Amerika", title: "Tenochtitlan mo'jizasi", text: "Asteklar imperiyasining poytaxti ko'l o'rtasida sun'iy orollarda qurilgan. Shahar o'zining kanallari, suzuvchi bog'lari va ulkan piramidalari bilan o'sha davrda yevropalik sayyohlarni hayratda qoldirgan." },
            { cat: "Amerika", title: "Inklar yo'l tizimi", text: "Inka imperiyasi tog'li hududlarda 40 000 kilometrdan ortiq tosh yotqizilgan yo'llarni barpo etgan. Bu yo'llar davlatning turli burchaklarini bog'lab, savdo va harbiy xavfsizlik uchun xizmat qilgan." },
            { cat: "Aloqa", title: "Tugunli yozuv: Kip", text: "Inklar murakkab ma'lumotlarni saqlash uchun 'Kip' (Quipu) deb ataluvchi rangli tugunli iplardan foydalanganlar. Bu iplar orqali davlat hisob-kitoblari va tarixiy voqealar muhrlangan." },
            { cat: "San'at", title: "Kamoliddin Behzod", text: "Sharq miniatyura san'atining buyuk ustasi. U o'z asarlarida inson qiyofasini va tabiatni juda nozik va aniq tasvirlagan, Hirot miniatyura maktabini jahonga tanitgan." },
            { cat: "Savdo", title: "Global Ipak Yo'li", text: "XIII-XV asrlarda Ipak yo'li o'zining eng faol davrini o'tagan. Bu yo'l orqali nafaqat ipak va ziravorlar, balki madaniyatlar, dinlar va texnologik ixtirolar qit'alararo almashilgan." },
            { cat: "Afrika", title: "Buyuk Zimbabve devori", text: "Janubiy Afrikadagi toshdan qurilgan mahobatli shahar. U loy yoki qorishtirmasiz faqat toshlarni mahorat bilan terish orqali qurilgan bo'lib, Afrika me'morchiligining cho'qqisidir." },
            { cat: "Matematika", title: "G'iyosiddin Jamshid al-Koshiy", text: "Samarqand observatoriyasining yetakchi olimlaridan biri. U o'nli kasrlarni mukammal darajaga keltirgan va matematik hisob-kitoblarda yangi uslublarni kashf etgan." },
            { cat: "Me'morchilik", title: "Bibixonim masjidi", text: "Amir Temur davrida Samarqandda qurilgan eng ulkan masjid. Uning mahobati va dekoratsiyasi o'sha davrdagi islom olamining muhandislik yutuqlarini ifodalaydi." },
            { cat: "Amerika", title: "Chichen Itsa piramidasi", text: "Mayya sivilizatsiyasining ushbu piramidasi aslida ulkan tosh kalendar hisoblanadi. U yulduzlar va quyosh holatiga qarab yil fasllarini aniq ko'rsatib turgan." },
            { cat: "Afrika", title: "Yetti shahar — Havsa", text: "G'arbiy Afrikada Havsa xalqi barpo etgan yetti shahar-davlat o'zining rivojlangan hunarmandchiligi, savdosi va mudofaa tizimi bilan mashhur bo'lgan." },
            { cat: "Tarix", title: "Sharafiddin Ali Yazdiy", text: "Uning 'Zafarnoma' asari Amir Temurning hayoti va faoliyatini yorituvchi eng ishonchli va badiiy mukammal tarixiy manba hisoblanadi." },
            { cat: "Xitoy", title: "Buyuk dengiz sayohatlari", text: "XV asr boshida Admiral Chjen Xe boshchiligidagi Xitoy floti Osiyo va Afrika qirg'oqlariga ulkan sayohatlar uyushtirib, madaniy va iqtisodiy aloqalarni o'rnatgan." },
            { cat: "Madaniyat", title: "Xulosa: Dunyo sivilizatsiyasi", text: "XIII-XV asrlar insoniyat uchun aql-zakovat, san'at va savdo-sotiqning uyg'unlashgan davridir. Bu davr merosi hozirgi zamon ilm-fani va madaniyati uchun poydevor bo'lib xizmat qiladi." }
        ];

        const grid = document.getElementById('mainGrid');
        const modal = document.getElementById('myModal');

        // Kartalarni yaratish
        facts.forEach((f, i) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.onclick = () => openModal(f);
            div.innerHTML = `
                <div class="card-num">${i + 1}</div>
                <div class="card-cat">${f.cat}</div>
                <div class="card-title">${f.title}</div>
                <div class="card-preview">${f.text}</div>
            `;
            grid.appendChild(div);
        });

        function openModal(f) {
            document.getElementById('mCat').innerText = f.cat;
            document.getElementById('mTitle').innerText = f.title;
            document.getElementById('mText').innerText = f.text;
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        // Modal tashqarisini bosganda ham yopilsin
        window.onclick = function(event) {
            if (event.target == modal) closeModal();
        }
    </script>
</body>
</html>
