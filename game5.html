<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Master Effects</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #121212;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: none;
        }

        /* Yutqazgandagi titrash effekti */
        .shake {
            animation: shake 0.5s;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            50% { transform: translate(-1px, 2px) rotate(1deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            100% { transform: translate(1px, -2px) rotate(0deg); }
        }

        .header {
            height: 10vh;
            display: flex;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 10px rgba(0,255,0,0.5);
        }

        canvas {
            border: 3px solid #333;
            background: #000;
            max-width: 95vw;
            max-height: 45vh;
            border-radius: 10px;
        }

        /* Game Over Menyusi */
        #gameOverMenu {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border: 2px solid #ff4d4d;
            border-radius: 20px;
            text-align: center;
            z-index: 10;
            box-shadow: 0 0 30px rgba(255, 77, 77, 0.5);
        }

        #gameOverMenu h2 { color: #ff4d4d; margin-bottom: 10px; font-size: 32px; }
        #gameOverMenu p { font-size: 20px; margin-bottom: 20px; }

        .controls {
            height: 35vh;
            display: grid;
            grid-template-columns: repeat(3, 70px);
            grid-template-rows: repeat(2, 70px);
            gap: 15px;
            margin-top: 15px;
        }

        .btn {
            width: 70px;
            height: 70px;
            background: #333;
            border: 2px solid #00ff00;
