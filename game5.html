<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Mini: Final Fixed</title>
    <style>
        body { margin: 0; background: #0f172a; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; background: #1e293b; }
        .joystick { position: absolute; width: 80px; height: 80px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); z-index: 10; }
        .handle { position: absolute; width: 34px; height: 34px; background: rgba(255,255,255,0.5); border-radius: 50%; top: 23px; left: 23px; pointer-events: none; }
        .btn { position: absolute; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; border: 2px solid #000; z-index: 10; cursor: pointer; box-shadow: 0 4px #000; font-size: 10px; }
       
        #move1 { bottom: 20px; left: 20px; } #aim1 { bottom: 20px; left: 110px; }
        #g1 { bottom: 100px; left: 20px; background: #f59e0b; } #u1 { bottom: 100px; left: 110px; background: #eab308; }
       
        #move2 { bottom: 20px; right: 110px; } #aim2 { bottom: 20px; right: 20px; }
        #g2 { bottom: 100px; right: 110px; background: #f59e0b; } #u2 { bottom: 100px; right: 20px; background: #eab308; }

        #win { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 100; }
    </style>
</head>
<body>

<div id="win"><h1 id="winTxt"></h1><button onclick="location.reload()" style="padding:10px 20px; cursor:pointer;">Yana o'ynash</button></div>
<canvas id="game"></canvas>

<div class="joystick" id="move1"><div class="handle"></div></div>
<div class="joystick" id="aim1"><div class="handle"></div></div>
<div class="btn" id="g1">GADGET</div><div class="btn" id="u1">SUPER</div>

<div class="joystick" id="move2"><div class="handle"></div></div>
<div class="joystick" id="aim2"><div class="handle"></div></div>
<div class="btn" id="g2">GADGET</div><div class="btn" id="u2">SUPER</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const R = 22;
let gameOver = false;
let keys = {};

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function createP(id, x, c) {
    return { id, x, y: canvas.height/2, c, hp: 3200, ammo: 3, vx: 0, vy: 0, ang: 0, super: 0, gadget: 3, isAim: false };
}

let p1 = createP(1, 100, '#dc2626');
let p2 = createP(2, canvas.width - 100, '#2563eb');
let bullets = [];
let walls = [
    {x: canvas.width/2 - 25, y: 150, w: 50, h: 200},
    {x: canvas.width/2 - 25, y: canvas.height - 350, w: 50, h: 200}
];

function setupJoy(id, p, type) {
    const el = document.getElementById(id);
    const h = el.querySelector('.handle');
    el.addEventListener('touchmove', e => {
        e.preventDefault();
        const t = e.touches[0];
        const rect = el.getBoundingClientRect();
        let dx = t.clientX - (rect.left + 40);
        let dy = t.clientY - (rect.top + 40);
        const d = Math.sqrt(dx*dx + dy*dy);
        if(d > 35) { dx *= 35/d; dy *= 35/d; }
        h.style.transform = `translate(${dx}px, ${dy}px)`;
        if(type === 'aim') { p.isAim = true; p.ang = Math.atan2(dy, dx); }
        else { p.vx = (dx/35)*5; p.vy = (dy/35)*5; }
    });
    el.addEventListener('touchend', () => {
        h.style.transform = 'translate(0,0)';
        if(type === 'aim') { if(p.isAim) shoot(p); p.isAim = false; }
        else { p.vx = 0; p.vy = 0; }
    });
}

setupJoy('move1', p1, 'move'); setupJoy('aim1', p1, 'aim');
setupJoy('move2', p2, 'move'); setupJoy('aim2', p2, 'aim');

function shoot(p, isG = false, isS = false) {
    if(p.ammo < 1 && !isS) return;
    bullets.push({ x: p.x, y: p.y, vx: Math.cos(p.ang)*(isS?15:12), vy: Math.sin(p.ang)*(isS?15:12), owner: p, isG, isS });
    if(!isS) p.ammo--;
}

document.getElementById('g1').onclick = () => { if(p1.gadget > 0) { p1.gadget--; shoot(p1, true); } };
document.getElementById('u1').onclick = () => { if(p1.super >= 100) { p1.super = 0; for(let i=0; i<8; i++) setTimeout(()=>shoot(p1,true,true), i*100); } };
document.getElementById('g2').onclick = () => { if(p2.gadget > 0) { p2.gadget--; shoot(p2, true); } };
document.getElementById('u2').onclick = () => { if(p2.super >= 100) { p2.super = 0; for(let i=0; i<8; i++) setTimeout(()=>shoot(p2,true,true), i*100); } };

function collide(nx, ny) {
    for(let w of walls) {
        if(nx+R > w.x && nx-R < w.x+w.w && ny+R > w.y && ny-R < w.y+w.h) return true;
    }
    return false;
}

function update() {
    if(gameOver) return;

    [p1, p2].forEach(p => {
        // Harakatni boshqarish
        let moveX = p.vx, moveY = p.vy;
        if(p.id === 1 && !p.vx && !p.vy) {
            if(keys['KeyW']) moveY = -5; if(keys['KeyS']) moveY = 5;
            if(keys['KeyA']) moveX = -5; if(keys['KeyD']) moveX = 5;
        } else if(p.id === 2 && !p.vx && !p.vy) {
            if(keys['ArrowUp']) moveY = -5; if(keys['ArrowDown']) moveY = 5;
            if(keys['ArrowLeft']) moveX = -5; if(keys['ArrowRight']) moveX = 5;
        }

        if(moveX || moveY) {
            if(!p.isAim) p.ang = Math.atan2(moveY, moveX);
            // Devorga urilishni tekshirish
            if(!collide(p.x + moveX, p.y)) p.x += moveX;
            if(!collide(p.x, p.y + moveY)) p.y += moveY;
        }

        p.x = Math.max(R, Math.min(canvas.width-R, p.x));
        p.y = Math.max(R, Math.min(canvas.height-R, p.y));
        if(p.ammo < 3) p.ammo += 0.015;

        if(p.hp <= 0) {
            gameOver = true;
            document.getElementById('win').style.display = 'flex';
            document.getElementById('winTxt').innerText = (p.id === 1 ? "KO'K" : "QIZIL") + " G'ALABA QILDI!";
        }
    });

    bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        let enemy = b.owner === p1 ? p2 : p1;
        if(Math.hypot(b.x-enemy.x, b.y-enemy.y) < R) {
            enemy.hp -= 400; b.owner.super = Math.min(100, b.owner.super + 15);
            bullets.splice(i, 1);
        }
        walls.forEach((w, wi) => {
            if(b.x > w.x && b.x < w.x+w.w && b.y > w.y && b.y < w.y+w.h) {
                if(b.isG || b.isS) walls.splice(wi, 1);
                bullets.splice(i, 1);
            }
        });
    });

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#475569'; walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));
    [p1, p2].forEach(p => {
        ctx.fillStyle = p.c; ctx.beginPath(); ctx.arc(p.x, p.y, R, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = p.super >= 100 ? 'gold' : 'black'; ctx.lineWidth = 3; ctx.stroke();
        ctx.fillStyle = 'black'; ctx.fillRect(p.x-25, p.y-45, 50, 6);
        ctx.fillStyle = '#22c55e'; ctx.fillRect(p.x-25, p.y-45, (Math.max(0, p.hp)/3200)*50, 6);
        ctx.fillStyle = '#facc15'; ctx.fillRect(p.x-25, p.y-37, (p.super/100)*50, 4);
    });
    ctx.fillStyle = 'white'; bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI*2); ctx.fill(); });
}
update();
</script>
</body>
</html>
