<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Flappy Bird</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            color: white; 
            font-family: sans-serif; 
            overflow: hidden;
            touch-action: none;
        }
        canvas { 
            border: 3px solid #ff00ff; 
            box-shadow: 0 0 20px #ff00ff;
            background: #050505;
            max-width: 100vw;
            max-height: 70vh;
        }
        .info { margin-top: 15px; font-size: 20px; font-weight: bold; color: #00ffff; }
        .hint { font-size: 14px; color: #888; margin-top: 5px; }
    </style>
</head>
<body onclick="jump()" onkeydown="if(event.code==='Space') jump()">

    <div class="info">BALL: <span id="score">0</span></div>
    <canvas id="birdCanvas" width="320" height="480"></canvas>
    <div class="hint">O'ynash uchun ekranga bosing!</div>

    <script>
        const canvas = document.getElementById("birdCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");

        // O'yin sozlamalari
        let bird = { x: 50, y: 150, w: 20, h: 20, gravity: 0.6, lift: -10, velocity: 0 };
        let pipes = [];
        let frame = 0;
        let score = 0;
        let gameActive = true;

        function jump() {
            if (!gameActive) { location.reload(); return; }
            bird.velocity = bird.lift;
        }

        function createPipe() {
            let gap = 120;
            let minHeight = 50;
            let height = Math.floor(Math.random() * (canvas.height - gap - minHeight * 2)) + minHeight;
            pipes.push({ x: canvas.width, top: height, bottom: canvas.height - height - gap });
        }

        function draw() {
            if (!gameActive) return;

            // Fonni tozalash
            ctx.fillStyle = "#050505";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Qushchani chizish (Neon kvadrat)
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            ctx.fillStyle = "#00ffff";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#00ffff";
            ctx.fillRect(bird.x, bird.y, bird.w, bird.h);
            ctx.shadowBlur = 0;

            // To'siqlarni chizish
            if (frame % 90 === 0) createPipe();

            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= 2;

                ctx.fillStyle = "#ff00ff";
                // Yuqori to'siq
                ctx.fillRect(pipes[i].x, 0, 40, pipes[i].top);
                // Pastki to'siq
                ctx.fillRect(pipes[i].x, canvas.height - pipes[i].bottom, 40, pipes[i].bottom);

                // To'qnashuvni tekshirish
                if (bird.x + bird.w > pipes[i].x && bird.x < pipes[i].x + 40) {
                    if (bird.y < pipes[i].top || bird.y + bird.h > canvas.height - pipes[i].bottom) {
                        gameOver();
                    }
                }

                // Ball hisoblash
                if (pipes[i].x === bird.x) {
                    score++;
                    scoreEl.innerText = score;
                }

                if (pipes[i].x + 40 < 0) pipes.splice(i, 1);
            }

            // Yerga yoki osmonga urilish
            if (bird.y + bird.h > canvas.height || bird.y < 0) gameOver();

            frame++;
            requestAnimationFrame(draw);
        }

        function gameOver() {
            gameActive = false;
            ctx.fillStyle = "rgba(0,0,0,0.7)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.font = "30px Arial";
            ctx.textAlign = "center";
            ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
            ctx.font = "16px Arial";
            ctx.fillText("Qayta boshlash uchun bosing", canvas.width / 2, canvas.height / 2 + 40);
        }

        draw();
    </script>
</body>
</html>
