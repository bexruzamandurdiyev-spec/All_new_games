<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonni Top Classic</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            width: 90vw;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }
        h2 { color: #38bdf8; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            border: 2px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 22px;
            text-align: center;
        }
        input:focus { border-color: #38bdf8; outline: none; }
        .main-btn {
            width: 100%;
            padding: 15px;
            background: #38bdf8;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #0f172a;
            cursor: pointer;
        }
        .msg { margin: 20px 0; font-size: 18px; color: #94a3b8; min-height: 60px; }
        .stats {
            margin-top: 20px;
            display: flex;
            justify-content: space-around;
            font-size: 14px;
            color: #64748b;
        }
        .best { color: #fbbf24; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sonni Top!</h2>
    <p>1 dan 100 gacha son o'yladim...</p>
    
    <div class="msg" id="msg">O'yinni boshlang!</div>
    
    <input type="number" id="guessInput" placeholder="00" min="1" max="100">
    
    <button class="main-btn" id="btn" onclick="check()">TEKSHIRISH</button>
    <button class="main-btn" id="restartBtn" onclick="init()" style="display:none; background:#10b981">YANA O'YNASH</button>

    <div class="stats">
        <div>Urinishlar: <span id="count">0</span></div>
        <div>Rekord: <span id="record" class="best">--</span></div>
    </div>
</div>

<script>
    let secret;
    let attempts;
    let best = localStorage.getItem('guessBest') || "--";

    document.getElementById('record').innerText = best;

    function init() {
        secret = Math.floor(Math.random() * 100) + 1;
        attempts = 0;
        document.getElementById('count').innerText = attempts;
        document.getElementById('msg').innerText = "Son o'ylandi! Topishga harakat qiling.";
        document.getElementById('msg').style.color = "#94a3b8";
        document.getElementById('guessInput').value = "";
        document.getElementById('guessInput').style.display = "block";
        document.getElementById('btn').style.display = "block";
        document.getElementById('restartBtn').style.display = "none";
    }

    function check() {
        let guess = parseInt(document.getElementById('guessInput').value);
        let msg = document.getElementById('msg');

        if (isNaN(guess) || guess < 1 || guess > 100) {
            msg.innerText = "Iltimos, 1-100 orasida son yozing!";
            return;
        }

        attempts++;
        document.getElementById('count').innerText = attempts;

        if (guess === secret) {
            msg.innerText = `G'ALABA! 🎉 \n ${attempts} ta urinishda topdingiz!`;
            msg.style.color = "#10b981";
            
            if (best === "--" || attempts < best) {
                best = attempts;
                localStorage.setItem('guessBest', best);
                document.getElementById('record').innerText = best;
                msg.innerText += " \n YANGI REKORD! 🏆";
            }
            
            document.getElementById('guessInput').style.display = "none";
            document.getElementById('btn').style.display = "none";
            document.getElementById('restartBtn').style.display = "block";
        } else if (guess < secret) {
            msg.innerText = "Kattaroq son ayting... ⬆️";
            msg.style.color = "#38bdf8";
        } else {
            msg.innerText = "Kichikroq son ayting... ⬇️";
            msg.style.color = "#f43f5e";
        }
        document.getElementById('guessInput').value = "";
    }

    init();
</script>

</body>
</html>
