<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonni Top: Battle</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 { margin-bottom: 20px; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }

        .mode-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .mode-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }
        .mode-btn.active { background: #00ff88; color: #1e3c72; font-weight: bold; }

        input {
            width: 100%;
            padding: 15px;
            font-size: 20px;
            border-radius: 10px;
            border: none;
            margin-bottom: 15px;
            text-align: center;
        }

        button.check-btn {
            width: 100%;
            padding: 15px;
            background: #00ff88;
            color: #1e3c72;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .message { margin-top: 20px; min-height: 50px; font-size: 18px; line-height: 1.4; }

        .stats {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
            font-size: 14px;
            text-align: left;
        }

        .record { color: #f1c40f; font-weight: bold; }
        
        #restartBtn { display: none; margin-top: 15px; background: #e74c3c; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sonni Top!</h1>

        <div class="mode-selector">
            <button class="mode-btn active" id="singleMode" onclick="setMode('single')">Bir kishi</button>
            <button class="mode-btn" id="multiMode" onclick="setMode('multi')">Ikki kishi</button>
        </div>

        <div id="gameArea">
            <p id="instruction" style="margin-bottom: 10px;">1 dan 100 gacha son o'yladim.</p>
            <input type="number" id="userInput" placeholder="Sonni yozing...">
            <button class="check-btn" onclick="checkGuess()">TEKSHIRISH</button>
            <button class="check-btn" id="restartBtn" onclick="initGame()">QAYTA BOSHLASH</button>
        </div>

        <div class="message" id="msg">O'yinni boshlaymiz!</div>

        <div class="stats">
            <div>Urinishlar: <span id="attempts">0</span></div>
            <div>Eng yaxshi natija: <span id="bestScore" class="record">--</span></div>
            <div id="p2Stat" style="display:none">2-o'yinchi rekordi: <span id="bestScoreP2" class="record">--</span></div>
        </div>
    </div>

    <script>
        let secretNum;
        let attempts = 0;
        let mode = 'single';
        let currentPlayer = 1;
        let bestSingle = localStorage.getItem('bestSingle') || Infinity;

        function initGame() {
            secretNum = Math.floor(Math.random() * 100) + 1;
            attempts = 0;
            document.getElementById('attempts').innerText = attempts;
            document.getElementById('msg').innerText = "1 dan 100 gacha son o'ylandi!";
            document.getElementById('msg').style.color = "white";
            document.getElementById('userInput').value = "";
            document.getElementById('userInput').style.display = "block";
            document.getElementById('restartBtn').style.display = "none";
            document.querySelector('.check-btn').style.display = "block";
            
            updateRecordsDisplay();
        }

        function setMode(newMode) {
            mode = newMode;
            document.getElementById('singleMode').classList.toggle('active', mode === 'single');
            document.getElementById('multiMode').classList.toggle('active', mode === 'multi');
            document.getElementById('p2Stat').style.display = (mode === 'multi') ? 'block' : 'none';
            
            if(mode === 'multi') {
                document.getElementById('instruction').innerText = "1-o'yinchi uchun son o'ylandi!";
            } else {
                document.getElementById('instruction').innerText = "1 dan 100 gacha son o'yladim.";
            }
            initGame();
        }

        function updateRecordsDisplay() {
            document.getElementById('bestScore').innerText = (bestSingle === Infinity) ? "--" : bestSingle;
        }

        function checkGuess() {
            let guess = parseInt(document.getElementById('userInput').value);
            if(isNaN(guess)) return;

            attempts++;
            document.getElementById('attempts').innerText = attempts;
            let msg = document.getElementById('msg');

            if(guess === secretNum) {
                msg.innerText = `G'ALABA! 🎉 \n ${attempts} ta urinishda topdingiz!`;
                msg.style.color = "#00ff88";
                endGame();
            } else if (guess < secretNum) {
                msg.innerText = "Kattaroq son ayting... ⬆️";
                msg.style.color = "#f39c12";
            } else {
                msg.innerText = "Kichikroq son ayting... ⬇️";
                msg.style.color = "#e74c3c";
            }
            document.getElementById('userInput').value = "";
        }

        function endGame() {
            if(mode === 'single') {
                if(attempts < bestSingle) {
                    bestSingle = attempts;
                    localStorage.setItem('bestSingle', bestSingle);
                    updateRecordsDisplay();
                    document.getElementById('msg').innerText += " \n YANGI REKORD! 🏆";
                }
            }
            document.getElementById('userInput').style.display = "none";
            document.querySelector('.check-btn').style.display = "none";
            document.getElementById('restartBtn').style.display = "block";
        }

        // Birinchi marta ishga tushirish
        initGame();
    </script>
</body>
</html>
