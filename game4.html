<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Sonni Top</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background: #f39c12; padding-top: 50px; }
        .container { background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        input { padding: 10px; font-size: 1.2rem; width: 60px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; font-size: 1.2rem; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .message { margin-top: 20px; font-size: 1.3rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>1 dan 100 gacha son o'yladim...</h1>
    <p>Uni topa olasizmi?</p>
    <input type="number" id="guessInput" min="1" max="100">
    <button onclick="checkGuess()">Tekshirish</button>
    <div class="message" id="msg">Omad tilayman!</div>
</div>

<script>
    const randomNumber = Math.floor(Math.random() * 100) + 1;
    let attempts = 0;

    function checkGuess() {
        const userGuess = document.getElementById('guessInput').value;
        const msg = document.getElementById('msg');
        attempts++;

        if (userGuess == randomNumber) {
            msg.innerText = `Tabriklayman! 🎉 ${attempts} ta urinishda topdingiz!`;
            msg.style.color = "green";
        } else if (userGuess > randomNumber) {
            msg.innerText = "Kichikroq son ayting... 👇";
            msg.style.color = "blue";
        } else {
            msg.innerText = "Kattaroq son ayting... 👆";
            msg.style.color = "red";
        }
    }
</script>

</body>
</html>
